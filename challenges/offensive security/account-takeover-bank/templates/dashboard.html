<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SecureVault Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .account-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .account-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .account-info {
            margin-bottom: 12px;
            color: #4a5568;
        }

        .account-info strong {
            display: block;
            color: #2d3748;
            margin-bottom: 3px;
        }

        .balance {
            font-size: 28px;
            color: #27ae60;
            font-weight: bold;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ecf0f1;
        }

        .transfer-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .transfer-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .message.error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .flag-display {
            background: #1a202c;
            color: #9ae6b4;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            display: none;
            margin-top: 20px;
            border: 2px solid #9ae6b4;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 SecureVault Bank Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <h2 style="color: white; margin-bottom: 20px;" id="greeting">Welcome!</h2>

        <div class="accounts-grid" id="accountsContainer"></div>

        <div class="transfer-section">
            <h2>💸 Transfer Money</h2>
            
            <form id="transferForm">
                <div class="form-group">
                    <label for="fromAccount">From Account</label>
                    <select id="fromAccount" required>
                        <option value="">Select account...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="toAccount">To Account</label>
                    <select id="toAccount" required>
                        <option value="">Select account...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <button type="submit">Send Money</button>
            </form>

            <div id="message" class="message"></div>
            <div id="flagDisplay" class="flag-display">
                <strong>🚩 FLAG CAPTURED:</strong>
                <div id="flagValue"></div>
            </div>
        </div>
    </div>

    <script>
        const sessionId = new URLSearchParams(window.location.search).get('session');
        const currentUsername = localStorage.getItem('username');

        if (!sessionId) {
            window.location.href = '/login';
        }

        async function loadAccounts() {
            try {
                const response = await fetch('/api/users');
                const data = await response.json();
                
                // Render account cards
                const container = document.getElementById('accountsContainer');
                container.innerHTML = '';
                
                const selectFrom = document.getElementById('fromAccount');
                const selectTo = document.getElementById('toAccount');
                selectFrom.innerHTML = '<option value="">Select account...</option>';
                selectTo.innerHTML = '<option value="">Select account...</option>';
                
                data.users.forEach(user => {
                    // Account card
                    const card = document.createElement('div');
                    card.className = 'account-card';
                    card.innerHTML = `
                        <h3>${user.username.toUpperCase()}</h3>
                        <div class="account-info">
                            <strong>Account Number</strong>
                            ${user.account_number}
                        </div>
                        <div class="balance">$${user.balance.toFixed(2)}</div>
                    `;
                    container.appendChild(card);
                    
                    // Add to selects
                    const option1 = document.createElement('option');
                    option1.value = user.username;
                    option1.textContent = `${user.username} ($${user.balance.toFixed(2)})`;
                    selectFrom.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = user.username;
                    option2.textContent = `${user.username} ($${user.balance.toFixed(2)})`;
                    selectTo.appendChild(option2);
                });
                
                document.getElementById('greeting').textContent = `Welcome, ${currentUsername}! 👋`;
            } catch (error) {
                console.error('Error loading accounts:', error);
            }
        }

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fromAccount = document.getElementById('fromAccount').value;
            const toAccount = document.getElementById('toAccount').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!fromAccount || !toAccount) {
                showMessage('⚠️ Please select both accounts', 'error');
                return;
            }
            
            if (fromAccount === toAccount) {
                showMessage('❌ Cannot transfer to same account', 'error');
                return;
            }
            
            if (amount <= 0) {
                showMessage('❌ Amount must be positive', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/transfer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-ID': sessionId
                    },
                    body: JSON.stringify({
                        from_account: fromAccount,
                        to_account: toAccount,
                        amount: amount
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`✅ Transfer successful! $${amount.toFixed(2)} sent`, 'success');
                    
                    if (data.flag) {
                        document.getElementById('flagValue').textContent = data.flag;
                        document.getElementById('flagDisplay').style.display = 'block';
                    }
                    
                    document.getElementById('transferForm').reset();
                    loadAccounts();
                } else {
                    showMessage(`❌ ${data.detail}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            }
        });

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
        }

        function logout() {
            fetch('/api/logout', {
                method: 'POST',
                headers: { 'X-Session-ID': sessionId }
            });
            localStorage.removeItem('sessionId');
            localStorage.removeItem('username');
            window.location.href = '/login';
        }

        loadAccounts();
    </script>
</body>
</html>
