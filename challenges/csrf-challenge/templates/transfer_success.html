<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiBank | Transfer Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --surface: #0f172a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 50% 30%, rgba(16, 185, 129, 0.12) 0%, transparent 50%);
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 3rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animated Checkmark */
        .check-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .check-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success), #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .check-circle svg {
            animation: drawCheck 0.4s ease-out 0.6s both;
        }

        @keyframes drawCheck {
            from {
                stroke-dashoffset: 30;
                opacity: 0;
            }

            to {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--success);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .detail-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
        }

        .detail-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .detail-value {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .detail-value.amount {
            color: var(--success);
            font-size: 1.3rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.875rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="check-wrap">
            <div class="pulse-ring"></div>
            <div class="check-circle">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray: 30;">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>

        <h1>Transfer Successful</h1>
        <p class="subtitle">Your funds have been sent securely.</p>

        <div class="detail-grid">
            <div class="detail-item">
                <div class="detail-label">From</div>
                <div class="detail-value">{{ sender }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">To</div>
                <div class="detail-value">{{ recipient }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Amount Sent</div>
                <div class="detail-value amount">${{ amount }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">New Balance</div>
                <div class="detail-value">${{ new_balance }}</div>
            </div>
        </div>

        <a href="/" class="btn-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>
    </div>
</body>

</html>
