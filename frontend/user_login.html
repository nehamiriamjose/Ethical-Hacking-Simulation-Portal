<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0b0f14, #020409);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0f7fa;
}

/* Card */
.card {
    width: 420px;
    background: rgba(15, 20, 26, 0.95);
    border-radius: 18px;
    padding: 40px 35px;
    box-shadow:
        0 0 0 1px rgba(0, 200, 255, 0.2),
        0 0 60px rgba(0, 200, 255, 0.35);
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 28px;
}

.icon {
    font-size: 40px;
    color: #00cfff;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    margin: 0 auto 10px;
}

.icon i,
.icon svg {
    width: 40px !important;
    height: 40px !important;
    stroke: #00cfff !important;
    color: #00cfff !important;
}

.header h1 {
    margin: 10px 0 4px;
    font-size: 22px;
    color: #00cfff;
}

.header p {
    margin: 0;
    font-size: 13px;
    color: #7fdfff;
}

/* Inputs */
.group {
    margin-top: 18px;
}

.group label {
    font-size: 12px;
    color: #9fbfcf;
}

.group input {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    background: #0b0f14;
    border: 1px solid #1e2a33;
    border-radius: 10px;
    color: #e0f7fa;
    outline: none;
}

.group input:focus {
    border-color: #00cfff;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.4);
}

/* Options */
.options {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
}

.options a {
    color: #00cfff;
    text-decoration: none;
}

/* Button */
button {
    margin-top: 26px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00cfff, #00ffb4);
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    color: #00141a;
}

button:hover {
    filter: brightness(1.1);
}

/* Footer */
.footer {
    margin-top: 22px;
    text-align: center;
    font-size: 13px;
}

.footer a {
    color: #8faebd;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="card">

    <div class="header">
        <div class="icon">
            <i data-lucide="shield"></i>
        </div>
        <h1>Hacker Portal</h1>
        <p>Learn & Conquer</p>
    </div>

    <div id="error-message" style="color: #ff6b6b; font-size: 13px; margin-top: 15px; text-align: center; display: none;"></div>

    <form method="post" action="/user/login" id="login-form">

        <div class="group">
            <label>User Email</label>
            <input type="email" name="email" id="email-input" placeholder="user@portal.com" required>
        </div>

        <div class="group">
            <label>Password</label>
            <input type="password" name="password" id="password-input" placeholder="••••••••" required>
        </div>

        <div class="options">
            <a href="/user/register">New user? Register</a>
        </div>

        <button type="submit">User Login</button>

    </form>

    <div class="footer">
        <a href="/">← Back to Role Selection</a>
    </div>

</div>

<script>
    // Check for error message in URL
    const params = new URLSearchParams(window.location.search);
    const errorMessage = params.get('error');
    
    if (errorMessage) {
        const errorDiv = document.getElementById('error-message');
        if (errorMessage === 'invalid_email') {
            errorDiv.textContent = 'Invalid username';
        } else if (errorMessage === 'invalid_password') {
            errorDiv.textContent = 'Invalid password';
        } else if (errorMessage === 'account_locked') {
            errorDiv.textContent = 'This account has been locked by an administrator';
        } else if (errorMessage === 'account_banned') {
            errorDiv.textContent = 'This account has been banned';
        }
        errorDiv.style.display = 'block';
    }

    // Clear error message when user starts typing
    document.getElementById('email-input').addEventListener('input', function() {
        const errorDiv = document.getElementById('error-message');
        if (errorDiv.style.display !== 'none') {
            errorDiv.style.display = 'none';
        }
    });

    document.getElementById('password-input').addEventListener('input', function() {
        const errorDiv = document.getElementById('error-message');
        if (errorDiv.style.display !== 'none') {
            errorDiv.style.display = 'none';
        }
    });

    lucide.createIcons();
</script>

</body>
</html>
