<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create Classes</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/admin_dashboard.css">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 7, 11, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 234, 255, 0.2);
      border-top-color: #00eaff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .content-card {
      background: #0b0f14;
      border-radius: 14px;
      padding: 24px;
      margin-top: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #121821;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #fff;
    }

    textarea {
      min-height: 120px;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .add {
      background: #0ea5e9;
      color: #000;
    }

    .save {
      background: #14f1b2;
      color: #000;
    }

    .back {
      background: #1f2937;
      color: #fff;
    }

    /* ================= BUTTON ANIMATION ================= */
    .btn.save.animating {
      animation: buttonMove 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes buttonMove {
      0% {
        transform: translateX(0) translateY(0);
        opacity: 1;
      }

      50% {
        transform: translateX(30px) translateY(-20px);
      }

      100% {
        transform: translateX(-40px) translateY(30px);
        opacity: 0;
      }
    }

    /* ================= TOAST NOTIFICATION ================= */
    #saveToast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #14f1b2 0%, #10b981 100%);
      color: #000;
      padding: 16px 24px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
      z-index: 10000;
      animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 4px 12px rgba(20, 241, 178, 0.3);
    }

    #saveToast.show {
      display: block;
    }

    @keyframes slideInRight {
      0% {
        opacity: 0;
        transform: translateX(40px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .kc-box,
    .content-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(20, 241, 178, .05);
      border: 1px solid rgba(20, 241, 178, .2);
    }

    .result {
      margin-top: 8px;
      font-weight: bold;
    }

    .correct {
      color: #14f1b2;
    }

    .wrong {
      color: #ff6b6b;
    }

    /* ================= IMAGE BLOCK STYLING ================= */
    .image-block {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(20, 241, 178, .05);
      border: 1px solid rgba(20, 241, 178, .2);
      align-items: flex-start;
      flex-direction: row;
    }

    .image-block.image-left {
      flex-direction: row;
    }

    .image-block.image-right {
      flex-direction: row-reverse;
    }

    .image-box {
      flex: 0 0 40%;
      min-height: 250px;
      border-radius: 8px;
      overflow: hidden;
      background: #121821;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #1f2937;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-box label {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #0ea5e9;
      font-size: 18px;
      font-weight: 600;
    }

    .image-desc {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .image-textarea {
      min-height: 150px;
      resize: vertical;
    }

    .image-toggle {
      display: flex;
      gap: 10px;
    }

    /* ================= ANIMATIONS ================= */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes buttonHover {
      to {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }
    }

    @keyframes buttonClick {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(0.95);
      }

      100% {
        transform: scale(1);
      }
    }

    .content-card {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transition: all 0.3s ease;
    }

    .content-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 241, 178, 0.1);
    }

    .actions {
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .btn {
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      animation: buttonClick 0.4s ease;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .kc-box {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transition: all 0.3s ease;
    }

    .kc-box:hover {
      background: rgba(20, 241, 178, 0.08);
      border-color: rgba(20, 241, 178, 0.3);
    }

    .content-box {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transition: all 0.3s ease;
    }

    .content-box:hover {
      background: rgba(20, 241, 178, 0.08);
      border-color: rgba(20, 241, 178, 0.3);
    }

    .image-block {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transition: all 0.3s ease;
    }

    .image-block:hover {
      background: rgba(20, 241, 178, 0.08);
      border-color: rgba(20, 241, 178, 0.3);
      transform: translateY(-2px);
    }

    .image-box {
      transition: all 0.3s ease;
    }

    .image-block:hover .image-box {
      border-color: rgba(14, 165, 233, 0.5);
      background: rgba(14, 165, 233, 0.05);
    }

    input,
    textarea {
      transition: all 0.3s ease;
    }

    input:focus,
    textarea:focus {
      background: #1a2332;
      border-color: #0ea5e9;
      box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
    }

    .progress-input {
      transition: all 0.3s ease;
    }

    .progress-input:hover {
      accent-color: #14f1b2;
    }

    .flow-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .flow-container>div {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ================= PROGRESS TRACKER ================= */
    .progress-section {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(14, 165, 233, .05);
      border: 1px solid rgba(14, 165, 233, .2);
    }

    .progress-section label {
      display: block;
      color: #0ea5e9;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .progress-input {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #1f2937;
      outline: none;
      cursor: pointer;
      accent-color: #0ea5e9;
    }

    .progress-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 15px;
    }

    .progress-bar {
      flex: 1;
      height: 8px;
      background: #1f2937;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5e9, #14f1b2);
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 0 12px rgba(14, 165, 233, 0.4), inset 0 0 8px rgba(20, 241, 178, 0.2);
    }

    .progress-bar:hover .progress-fill {
      box-shadow: 0 0 16px rgba(14, 165, 233, 0.6), inset 0 0 10px rgba(20, 241, 178, 0.3);
    }

    .progress-percentage {
      color: #0ea5e9;
      font-weight: 600;
      font-size: 14px;
      min-width: 45px;
      text-align: right;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .progress-section {
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .progress-section:hover {
      background: rgba(14, 165, 233, 0.08);
      border-color: rgba(14, 165, 233, 0.3);
    }

    /* ================= BACK BUTTON ANIMATION ================= */
    @keyframes slideOutLeft {
      from {
        opacity: 1;
        transform: translateX(0);
      }

      to {
        opacity: 0;
        transform: translateX(-30px);
      }
    }

    .btn.back.navigating {
      animation: slideOutLeft 0.4s cubic-bezier(0.42, 0, 1, 1) forwards;
    }

    /* Page Transition Animations */
    .sidebar {
      animation: pageSlideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    main {
      animation: pageSlideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pageSlideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pageSlideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Content Animations */
    .content-card {
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards !important;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- SAVE SUCCESS TOAST -->
  <div id="saveToast">✓ Changes saved successfully!</div>

  <div class="layout">

    <aside class="sidebar">
      <div class="brand">
        <span class="shield">
          <i data-lucide="shield"></i>
        </span>
        <div>
          <h2>Hacker Portal</h2>
          <p>Learn & Conquer</p>
        </div>
      </div>
      <nav class="menu">
        <a href="/admin/dashboard"><i data-lucide="layout-grid"></i> Dashboard</a>
        <a href="/admin/users"><i data-lucide="users"></i> User Management</a>
        <a href="/admin/challenges"><i data-lucide="target"></i> Challenges</a>
        <a href="/admin/tutorials" class="active"><i data-lucide="book-open"></i> Tutorials</a>
        <a href="/admin/quizzes"><i data-lucide="help-circle"></i> Quizzes</a>
        <a href="/admin/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
        <a href="/admin/sandbox"><i data-lucide="cpu"></i> Sandbox Monitor</a>
        <a href="/admin/notifications"><i data-lucide="bell"></i> Notifications</a>
        <a href="/admin/analytics"><i data-lucide="bar-chart-2"></i> Analytics</a>
      </nav>

      <a class="logout" href="/"><i data-lucide="log-out"></i> Logout</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Create Classes</h1>
      </header>

      <div class="actions">
        <button class="btn add" onclick="addClass()">+ Add Class</button>
        <button class="btn back" onclick="goBack()">← Back</button>
      </div>

      <!-- 🔥 REQUIRED CONTAINER -->
      <div id="classContainer"></div>

      <div class="actions" style="margin-top:30px;">
        <button class="btn save" onclick="saveAllChanges()">💾 Save Changes</button>
      </div>

    </main>
  </div>

  <script>
    let classCount = 0;

    /* ================= ADD CLASS ================= */
    function addClass() {
      classCount++;

      const container = document.getElementById("classContainer");

      container.insertAdjacentHTML("beforeend", `
    <div class="content-card">

      <h3>Class ${classCount}</h3>
      <input class="class-title" placeholder="Class Heading">

      <!-- PROGRESS TRACKER -->
      <div class="progress-section">
        <label for="progress-${classCount}">📊 Progress: <span class="progress-value">${classCount === 1 ? '0' : '0'}</span>%</label>
        <input type="range" min="0" max="100" value="0" class="progress-input" data-progress-class="${classCount}" onchange="updateProgressDisplay(this)">
        <div class="progress-display">
          <div class="progress-bar">
            <div class="progress-fill" style="width:0%"></div>
          </div>
          <span class="progress-percentage">0%</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn add" onclick="addContent(this)">Create Content</button>
        <button class="btn add" onclick="addKC(this)">+ Add Knowledge Check</button>
        <button class="btn add" onclick="addImage(this)">+ Add Image</button>
      </div>

      <!-- ORDER-PRESERVING FLOW -->
      <div class="flow-container"></div>

    </div>
  `);
    }

    function updateProgressDisplay(input) {
      const card = input.closest(".content-card");
      const progressValue = input.value;

      // Update percentage text in label
      card.querySelector(".progress-value").textContent = progressValue;

      // Update progress bar fill
      const progressFill = card.querySelector(".progress-fill");
      progressFill.style.width = progressValue + "%";

      // Update percentage display
      const progressPercentage = card.querySelector(".progress-percentage");
      progressPercentage.textContent = progressValue + "%";
    }

    /* ================= CONTENT BLOCK ================= */
    function addContent(btn) {
      const flow = btn.closest(".content-card").querySelector(".flow-container");

      flow.insertAdjacentHTML("beforeend", `
    <div class="content-box">
      <textarea placeholder="Write class notes here..."></textarea>
    </div>
  `);
    }

    /* ================= KNOWLEDGE CHECK ================= */
    function addKC(btn) {
      const flow = btn.closest(".content-card").querySelector(".flow-container");

      flow.insertAdjacentHTML("beforeend", `
    <div class="kc-box">
      <input placeholder="Question">
      <input placeholder="Correct Answer (text)">
      <input placeholder="Hint (optional)">
      <input placeholder="Test Answer">

      <button class="btn add" onclick="checkAnswer(this)">Check Answer</button>
      <div class="result"></div>
    </div>
  `);
    }

    function checkAnswer(btn) {
      const box = btn.closest(".kc-box");
      const inputs = box.querySelectorAll("input");

      const correct = inputs[1].value.trim().toLowerCase();
      const test = inputs[3].value.trim().toLowerCase();
      const hint = inputs[2].value;
      const res = box.querySelector(".result");

      if (!correct || !test) {
        res.textContent = "Enter both answers";
        res.className = "result wrong";
        return;
      }

      if (correct === test) {
        res.textContent = "✔ Correct Answer";
        res.className = "result correct";
      } else {
        res.textContent = "✖ Wrong Answer" + (hint ? " | Hint: " + hint : "");
        res.className = "result wrong";
      }
    }

    /* ================= IMAGE POSITIONING ================= */
    function setImageLeft(btn) {
      const block = btn.closest(".image-block");
      if (block) {
        block.classList.remove("image-right");
        block.classList.add("image-left");
        console.log("Image set to LEFT");
      }
    }

    function setImageRight(btn) {
      const block = btn.closest(".image-block");
      if (block) {
        block.classList.remove("image-left");
        block.classList.add("image-right");
        console.log("Image set to RIGHT");
      }
    }

    function deleteImage(btn) {
      const block = btn.closest(".image-block");
      block.remove();
    }

    /* ================= IMAGE BLOCK ================= */
    function addImage(btn) {
      const flow = btn.closest(".content-card").querySelector(".flow-container");

      flow.insertAdjacentHTML("beforeend", `
    <div class="image-block image-left"
         data-image-name="">

      <div class="image-box">
        <label>
          <input type="file"
                 accept="image/*"
                 hidden
                 onchange="uploadImage(this)">
          <span>📷 Upload Image</span>
        </label>
      </div>

      <div class="image-desc">
        <textarea class="image-textarea"
          placeholder="Write description for this image..."></textarea>

        <div class="image-toggle">
          <button class="btn back" onclick="setImageLeft(this)">
            ⬅ Image Left
          </button>
          <button class="btn add" onclick="setImageRight(this)">
            ➡ Image Right
          </button>
          <button class="btn" style="background:#ff6b6b; color:#fff;" onclick="deleteImage(this)">
            🗑 Delete
          </button>
        </div>
      </div>

    </div>
  `);
    }
    async function uploadImage(input) {
      const file = input.files[0];
      if (!file) return;

      const block = input.closest(".image-block");
      const box = block.querySelector(".image-box");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch("/admin/tutorials/upload-image", {
          method: "POST",
          body: formData
        });

        if (!res.ok) throw new Error("Upload failed");

        const data = await res.json();

        // ✅ Extract filename from URL
        const imageName = data.image_url.split("/").pop();

        // ✅ STORE ONLY filename (BACKEND EXPECTS THIS)
        block.setAttribute("data-image-name", imageName);

        // ✅ Still use URL for preview
        box.innerHTML = `
      <img src="${data.image_url}"
           style="width:100%;height:100%;
                  object-fit:cover;border-radius:8px;">
    `;

      } catch (err) {
        console.error(err);
        alert("Image upload failed");
      }
    }


    /* ================= SAVE ALL ================= */
    function saveAllChanges() {
      const urlParams = new URLSearchParams(window.location.search);
      const tutorialId = urlParams.get("tutorial_id");

      if (!tutorialId) {
        alert("Tutorial ID missing");
        return;
      }

      const classes = [];

      document.querySelectorAll(".content-card").forEach(card => {
        const title = card.querySelector(".class-title")?.value.trim();
        if (!title) return;

        // Get progress percentage from the progress input
        const progressInput = card.querySelector(".progress-input");
        const progress = progressInput ? parseInt(progressInput.value) : 0;

        const blocks = [];

        // Preserve click order
        card.querySelectorAll(".flow-container > div").forEach(block => {

          /* -------- CONTENT -------- */
          if (block.classList.contains("content-box")) {
            const text = block.querySelector("textarea").value.trim();
            if (text) {
              blocks.push({
                type: "content",
                text
              });
            }
          }

          /* -------- KNOWLEDGE CHECK -------- */
          if (block.classList.contains("kc-box")) {
            const inputs = block.querySelectorAll("input");
            const question = inputs[0].value.trim();
            const answer = inputs[1].value.trim();
            const hint = inputs[2].value.trim();

            if (question && answer) {
              blocks.push({
                type: "knowledge",
                text: question,
                answer,
                hint
              });
            }
          }
          /* -------- IMAGE BLOCK -------- */
          if (block.classList.contains("image-block")) {
            const desc =
              block.querySelector(".image-textarea")?.value.trim() || "";

            const imageName =
              block.getAttribute("data-image-name") || "";

            const position =
              block.classList.contains("image-right")
                ? "right"
                : "left";

            if (imageName || desc) {
              blocks.push({
                type: "image",
                image_name: imageName,
                position: position,
                description: desc
              });
            }
          }



        });

        if (blocks.length > 0) {
          classes.push({ title, blocks, progress_percentage: progress });
        }
      });

      if (classes.length === 0) {
        alert("No valid classes to save");
        return;
      }

      // Show saving indicator
      const saveBtn = document.querySelector(".btn.save");
      const originalText = saveBtn.textContent;
      saveBtn.textContent = "⏳ Saving...";
      saveBtn.disabled = true;
      saveBtn.classList.add("animating");

      console.log("Sending payload:", JSON.stringify({ classes }));

      fetch(`/admin/tutorials/${tutorialId}/classes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ classes })
      })
        .then(res => {
          console.log("Response status:", res.status);
          if (!res.ok) {
            return res.text().then(text => {
              throw new Error(`HTTP ${res.status}: ${text}`);
            });
          }
          return res.json();
        })
        .then(data => {
          console.log("Save successful:", data);
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;

          // Show success toast
          const toast = document.getElementById('saveToast');
          toast.classList.add('show');

          // Hide toast after 2 seconds and redirect
          setTimeout(() => {
            toast.classList.remove('show');
            window.location.href = "/admin/tutorials";
          }, 2000);
        })
        .catch(err => {
          console.error("Save error:", err);
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          alert("Failed to save tutorial: " + err.message);
        });
    }

    function goBack() {
      const backBtn = document.querySelector(".btn.back");
      if (backBtn) {
        backBtn.classList.add("navigating");
      }

      // Wait for animation to complete before navigating
      setTimeout(() => {
        window.location.href = "/admin/tutorials";
      }, 500);
    }

    lucide.createIcons();
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", loadExistingClasses);

    async function loadExistingClasses() {
      const params = new URLSearchParams(window.location.search);
      const tutorialId = params.get("tutorial_id");

      if (!tutorialId) return;

      try {
        const res = await fetch(`/admin/tutorials/${tutorialId}/classes`);
        if (!res.ok) return;

        const data = await res.json();
        const classes = data.classes || [];

        classes.forEach((cls, index) => {
          addClass(); // reuse your existing function

          const card = document.querySelectorAll(".content-card")[index];
          card.querySelector(".class-title").value = cls.title;

          // Set progress percentage
          const progressInput = card.querySelector(".progress-input");
          const progressValue = cls.progress_percentage || 0;
          if (progressInput) {
            progressInput.value = progressValue;
            // Update the display
            updateProgressDisplay(progressInput);
          }

          const flow = card.querySelector(".flow-container");

          cls.blocks.forEach(block => {
            if (block.type === "content") {
              flow.insertAdjacentHTML("beforeend", `
                        <div class="content-box">
                            <textarea>${block.text || ""}</textarea>
                        </div>
                    `);
            }

            if (block.type === "knowledge") {
              flow.insertAdjacentHTML("beforeend", `
                        <div class="kc-box">
                            <input value="${block.text || ""}" placeholder="Question">
                            <input value="${block.answer || ""}" placeholder="Correct Answer">
                            <input value="${block.hint || ""}" placeholder="Hint">
                            <input placeholder="Test Answer">
                            <button class="btn add" onclick="checkAnswer(this)">
                                Check Answer
                            </button>
                            <div class="result"></div>
                        </div>
                    `);
            }
            if (block.type === "image") {
              const posClass = block.position === "right"
                ? "image-right"
                : "image-left";

              const imageUrl = block.image_url || `/admin/tutorials/images/${block.image_name}`;

              flow.insertAdjacentHTML("beforeend", `
                          <div class="image-block ${posClass}"
                              data-image-name="${block.image_name || ""}">

                              <div class="image-box">
                                  <img src="${imageUrl}"
                                      style="width:100%;height:100%;
                                              object-fit:cover;border-radius:8px;">
                              </div>

                              <div class="image-desc">
                                  <textarea class="image-textarea"
                                      placeholder="Write description...">${block.description || ""}</textarea>

                                  <div class="image-toggle">
                                      <button class="btn back"
                                          onclick="setImageLeft(this)">⬅ Image Left</button>
                                      <button class="btn add"
                                          onclick="setImageRight(this)">➡ Image Right</button>
                                      <button class="btn" style="background:#ff6b6b; color:#fff;"
                                          onclick="deleteImage(this)">🗑 Delete</button>
                                  </div>
                              </div>
                          </div>
                      `);
            }

          });
        });

      } catch (err) {
        console.error("Failed to load tutorial", err);
      }
    }
  </script>
  <script>lucide.createIcons();</script>
</body>

</html>
