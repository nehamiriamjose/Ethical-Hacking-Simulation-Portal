<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tutorial Preview</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/admin_dashboard.css?v=7">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 7, 11, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 234, 255, 0.2);
      border-top-color: #00eaff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .content-card {
      background: #0b0f14;
      border-radius: 14px;
      padding: 24px;
      margin-top: 20px;
    }

    .actions {
      margin-top: 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 99;
      background: #0a0d12;
      padding: 10px 28px;
      border-bottom: 1px solid rgba(14, 165, 233, .15);
    }

    @keyframes slideOutLeft {
      0% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(-40px);
      }
    }

    @keyframes slideOutDown {
      0% {
        opacity: 1;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .btn {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.back {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      color: #e5e7eb;
      border: 1px solid rgba(14, 165, 233, .2);
      position: relative;
      overflow: hidden;
    }

    .btn.back::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.4s ease;
      pointer-events: none;
    }

    .btn.back:hover::before {
      left: 100%;
    }

    .btn.back.animating {
      animation: slideOutLeft 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .btn.save.animating {
      animation: slideOutLeft 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* ========== EXIT MODAL ========== */
    #exitTimer {
      position: fixed;
      display: none;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 9999;
      animation: slideInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #exitTimer.show {
      display: flex;
    }

    .exit-text {
      font-size: 16px;
      color: #14f1b2;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .exit-circle {
      width: 50px;
      height: 50px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .exit-circle svg {
      transform: rotate(-90deg);
    }

    .exit-circle-bg {
      fill: none;
      stroke: rgba(20, 241, 178, 0.2);
      stroke-width: 3;
    }

    .exit-circle-progress {
      fill: none;
      stroke: #14f1b2;
      stroke-width: 3;
      stroke-dasharray: 113.097;
      stroke-dashoffset: 113.097;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease;
      filter: drop-shadow(0 0 8px rgba(20, 241, 178, 0.6));
    }

    .exit-countdown {
      position: absolute;
      font-size: 20px;
      color: #14f1b2;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px rgba(20, 241, 178, 0.6);
    }

    /* CONGRATULATIONS MODAL */
    #congratsModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.3s ease-in-out;
    }

    #congratsModal.show {
      display: flex;
    }

    .congrats-content {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(10, 13, 18, 0.9) 100%);
      border: 2px solid rgba(16, 185, 129, 0.4);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), pulse 2s ease-in-out infinite;
    }

    .congrats-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .congrats-content h2 {
      font-size: 36px;
      color: #10b981;
      margin: 0 0 15px 0;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .congrats-content p {
      font-size: 16px;
      color: #d1d5db;
      margin: 0 0 30px 0;
    }

    .congrats-stars {
      font-size: 40px;
      letter-spacing: 10px;
      animation: starPulse 0.8s ease-in-out;
    }

    @keyframes bounce {
      0% {
        transform: translateY(-30px);
        opacity: 0;
      }

      50% {
        transform: translateY(10px);
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes starPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    @keyframes slideInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .add {
      background: #0ea5e9;
      color: #000;
    }

    .save {
      background: #14f1b2;
      color: #000;
    }

    .kc-box,
    .content-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(20, 241, 178, .05);
      border: 1px solid rgba(20, 241, 178, .2);
    }

    .result {
      margin-top: 8px;
      font-weight: bold;
    }

    .correct {
      color: #14f1b2;
    }

    .wrong {
      color: #ff6b6b;
    }

    /* ================= IMAGE BLOCK STYLING ================= */
    .image-block {
      display: none !important;
      gap: 20px;
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(20, 241, 178, .05);
      border: 1px solid rgba(20, 241, 178, .2);
      align-items: flex-start;
      flex-direction: row;
    }

    .image-block.image-left {
      flex-direction: row;
    }

    .image-block.image-right {
      flex-direction: row-reverse;
    }

    .image-box {
      flex: 0 0 40%;
      min-height: 250px;
      border-radius: 8px;
      overflow: hidden;
      background: #121821;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #1f2937;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-desc {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .image-textarea {
      min-height: 150px;
      resize: vertical;
    }

    .image-toggle {
      display: flex;
      gap: 10px;
    }

    .class-counter {
      background: rgba(20, 241, 178, .1);
      border: 1px solid rgba(20, 241, 178, .2);
      padding: 12px 16px;
      border-radius: 8px;
      color: #14f1b2;
      font-weight: 600;
      text-align: center;
      min-width: 120px;
    }

    .nav-section {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .content-card h3 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
      color: #14f1b2;
    }

    .flow-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .content-box p {
      margin: 0;
      line-height: 1.6;
      color: #e5e7eb;
    }

    .kc-box p {
      margin: 8px 0;
      line-height: 1.5;
      color: #e5e7eb;
    }

    .kc-box strong {
      color: #10b981;
    }

    .kc-box .hint {
      color: #f59e0b;
      margin-top: 8px;
    }

    .image-description {
      color: #e5e7eb;
      line-height: 1.6;
      font-size: 15px;
    }

    .main {
      padding: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      margin-bottom: 0;
      position: fixed;
      top: 0;
      right: 0;
      left: 250px;
      z-index: 100;
      background: #0a0d12;
      padding: 14px 28px;
    }

    .topbar h1 {
      font-size: 28px;
      font-weight: 600;
      color: #14f1b2;
      margin: 0;
    }

    /* ================= ANIMATIONS ================= */
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      60% {
        opacity: 0.8;
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-20px);
      }
    }

    .content-card {
      animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #classContainer {
      padding: 28px;
      padding-top: 28px;
    }

    #classContainer.transitioning .content-card {
      animation: fadeOut 0.5s cubic-bezier(0.42, 0, 1, 1);
    }

    /* ================= PROGRESS TRACKER ================= */
    #progressContainer {
      position: sticky;
      top: 53px;
      z-index: 98;
      background: #0a0d12;
      padding: 12px 28px;
    }

    .progress-section {
      margin-top: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .progress-section label {
      display: block;
      color: #0ea5e9;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .progress-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .progress-bar {
      flex: 1;
      height: 8px;
      background: #1f2937;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5e9, #14f1b2);
      width: 0%;
      transition: width 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 0 10px rgba(20, 241, 178, 0.5);
    }

    .progress-percentage {
      color: #0ea5e9;
      font-weight: 600;
      font-size: 14px;
      min-width: 45px;
      text-align: right;
      transition: all 0.6s ease-out;
    }

    /* ================= INTERACTIVE KC STYLING ================= */
    .kc-interactive {
      padding: 20px;
      background: rgba(14, 165, 233, .08);
      border: 1px solid rgba(14, 165, 233, .2);
      border-radius: 12px;
      margin-top: 16px;
      animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .kc-question {
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .question-label {
      color: #0ea5e9;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .answer-input {
      width: 100%;
      padding: 12px 16px;
      background: #0b0f14;
      border: 2px solid #1f2937;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      margin-bottom: 12px;
    }

    .answer-input:focus {
      outline: none;
      border-color: #0ea5e9;
      background: #121821;
      box-shadow: 0 0 12px rgba(14, 165, 233, 0.3);
    }

    .kc-button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .hint-btn {
      padding: 10px 16px;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .hint-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(245, 158, 11, 0.3);
    }

    .hint-btn:active {
      transform: scale(0.95);
    }

    .hint-container {
      margin-top: 12px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .hint-container.show {
      max-height: 500px;
      opacity: 1;
    }

    .hint-text {
      padding: 12px 16px;
      background: rgba(245, 158, 11, 0.1);
      border-left: 3px solid #f59e0b;
      border-radius: 6px;
      color: #fcd34d;
      font-size: 14px;
      line-height: 1.6;
    }

    .submit-answer-btn {
      padding: 10px 16px;
      background: #14f1b2;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .submit-answer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(20, 241, 178, 0.3);
    }

    .submit-answer-btn:active {
      transform: scale(0.95);
    }

    .answer-feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .answer-feedback.correct {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #10b981;
      color: #10b981;
    }

    .answer-feedback.incorrect {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .answer-feedback.spelling-error {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid #f59e0b;
      color: #fcd34d;
    }

    /* Page Transition Animations */
    .sidebar {
      animation: pageSlideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    main {
      animation: pageSlideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pageSlideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pageSlideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Content Animations */
    .content-card {
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards !important;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="brand">
        <span class="shield">
          <i data-lucide="shield"></i>
        </span>
        <div>
          <h2>Hacker Portal</h2>
          <p>Learn & Conquer</p>
        </div>
      </div>
      <nav class="menu">
        <a href="/admin/dashboard"><i data-lucide="layout-grid"></i> Dashboard</a>
        <a href="/admin/users"><i data-lucide="users"></i> User Management</a>
        <a href="/admin/challenges"><i data-lucide="target"></i> Challenges</a>
        <a href="/admin/tutorials" class="active"><i data-lucide="book-open"></i> Tutorials</a>
        <a href="/admin/quizzes"><i data-lucide="help-circle"></i> Quizzes</a>
        <a href="/admin/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
        <a href="/admin/sandbox"><i data-lucide="cpu"></i> Sandbox Monitor</a>
        <a href="/admin/notifications"><i data-lucide="bell"></i> Notifications</a>
        <a href="/admin/analytics"><i data-lucide="bar-chart-2"></i> Analytics</a>
      </nav>
      <a class="logout" href="/"><i data-lucide="log-out"></i> Logout</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Tutorial Preview</h1>
      </header>

      <div class="actions">
        <button class="btn back" onclick="goBack()">← Back</button>
      </div>

      <!-- PROGRESS BAR CONTAINER (STAYS VISIBLE) -->
      <div id="progressContainer"></div>

      <!-- CURRENT CLASS CONTAINER (TRANSITIONS) -->
      <div id="classContainer"></div>

      <!-- NAVIGATION -->
      <div class="nav-section">
        <button id="prevBtn" class="btn back" onclick="prevClass()">⬅ Previous Class</button>
        <div class="class-counter"><span id="currentClass">1</span> / <span id="totalClasses">1</span></div>
        <button id="nextBtn" class="btn add" onclick="nextClass()">Next Class ➡</button>
        <button id="completeBtn" class="btn add" onclick="completeTutorial()"
          style="display: none; background: linear-gradient(135deg, #10b981 0%, #059669 100%); gap: 8px;">✓ Complete
          Tutorial</button>
        <button id="exitBtn" class="btn save" onclick="exitTutorial()">Exit Tutorial ✓</button>
      </div>

    </main>

    <!-- EXIT TIMER -->
    <div id="exitTimer">
      <div class="exit-text">Exiting</div>
      <div class="exit-circle">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle class="exit-circle-bg" cx="25" cy="25" r="18" />
          <circle class="exit-circle-progress" id="progressCircle" cx="25" cy="25" r="18" />
        </svg>
        <div class="exit-countdown" id="countdownNum">2</div>
      </div>
    </div>

    <!-- CONGRATULATIONS MODAL -->
    <div id="congratsModal">
      <div class="congrats-content">
        <div class="congrats-icon">🎉</div>
        <h2>Congratulations!</h2>
        <p>You've completed this tutorial!</p>
        <div class="congrats-stars">⭐ ⭐ ⭐</div>
      </div>
    </div>

  </div>

  <script>
    let classes = [];
    let currentIndex = 0;
    let completedClasses = new Set(); // Track which classes are completed
    let savedProgressPercentage = 0; // Stores progress percentage loaded from database
    let solvedKCs = new Set(); // Track which KCs in current class are solved
    let solvedKCsPerClass = {}; // Track solved KCs for each class to preserve progress when navigating

    const pathParts = window.location.pathname.split("/");
    const tutorialId = pathParts[pathParts.length - 2];

    /* ================= LOAD DATA ================= */
    async function loadTutorial() {
      try {
        console.log("Loading tutorial with ID:", tutorialId);
        const res = await fetch(`/admin/tutorials/${tutorialId}/classes`);
        console.log("Response status:", res.status);

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: Failed to load tutorial`);
        }

        const data = await res.json();
        console.log("Received data:", data);

        classes = data.classes || [];

        if (classes.length === 0) {
          document.getElementById("classContainer").innerHTML = "<p style='color: #ff6b6b; padding: 20px;'>❌ No classes available for this tutorial. Please edit the tutorial and add some classes first.</p>";
          return;
        }

        document.getElementById("totalClasses").textContent = classes.length;
        renderClass();
      } catch (err) {
        console.error("Error loading tutorial:", err);
        document.getElementById("classContainer").innerHTML = `<p style='color: #ff6b6b; padding: 20px;'>❌ Error loading tutorial data: ${err.message}</p>`;
      }
    }

    /* ================= RENDER PROGRESS BAR ================= */
    function renderProgressBar() {
      const progressContainer = document.getElementById("progressContainer");

      // If we have saved progress from the database, use it; otherwise calculate from completedClasses
      let cumulativeProgress = 0;

      if (savedProgressPercentage > 0) {
        // Use saved progress percentage
        cumulativeProgress = savedProgressPercentage;
        console.log("Using saved progress percentage:", cumulativeProgress);
      } else {
        // Calculate cumulative progress from ONLY completed classes
        // Sum the progress_percentage values set by admin for completed classes
        completedClasses.forEach(classIndex => {
          cumulativeProgress += (classes[classIndex].progress_percentage || 0);
        });
        console.log("Calculated progress from completed classes:", cumulativeProgress);
      }

      // Cap at 100%
      cumulativeProgress = Math.min(cumulativeProgress, 100);

      // Only create the progress bar on first load
      if (progressContainer.innerHTML === '') {
        const progressHTML = `
      <div class="progress-section">
        <label>📊 Progress: <span class="progress-value">${cumulativeProgress}</span>%</label>
        <div class="progress-display">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${cumulativeProgress}%"></div>
          </div>
          <span class="progress-percentage">${cumulativeProgress}%</span>
        </div>
      </div>
    `;
        progressContainer.innerHTML = progressHTML;
      } else {
        // Update existing progress bar smoothly
        const progressFill = progressContainer.querySelector(".progress-fill");
        const progressValue = progressContainer.querySelector(".progress-value");
        const progressPercentage = progressContainer.querySelector(".progress-percentage");

        if (progressFill) {
          progressFill.style.width = cumulativeProgress + "%";
        }
        if (progressValue) {
          progressValue.textContent = cumulativeProgress;
        }
        if (progressPercentage) {
          progressPercentage.textContent = cumulativeProgress + "%";
        }
      }
    }
    /* ================= RENDER CLASS ================= */
    function renderClass() {
      const container = document.getElementById("classContainer");
      const cls = classes[currentIndex];

      if (!cls) return;

      // Initialize solvedKCs for this class if not already done
      const classKey = `class-${currentIndex}`;
      if (!solvedKCsPerClass[classKey]) {
        solvedKCsPerClass[classKey] = new Set();
      }

      // Restore solvedKCs from the per-class tracking
      solvedKCs = solvedKCsPerClass[classKey];

      // Count total KCs in this class
      let totalKCs = 0;
      cls.blocks.forEach(block => {
        if (block.type === "knowledge") {
          totalKCs++;
        }
      });

      // Render progress bar separately (stays visible during transitions)
      renderProgressBar();

      let html = `
    <div class="content-card">
      <h3>${cls.title}</h3>
      
      <div class="flow-container">`;

      cls.blocks.forEach((block, index) => {
        // CONTENT BLOCK
        if (block.type === "content") {
          html += `<div class="content-box"><p>${block.text}</p></div>`;
        }

        // KNOWLEDGE CHECK BLOCK
        if (block.type === "knowledge") {
          const kcId = `kc-${currentIndex}-${index}`;
          html += `
        <div class="kc-interactive" id="${kcId}">
          <div class="question-label">📚 Question</div>
          <div class="kc-question">${block.text}</div>
          
          <input type="text" class="answer-input" placeholder="Type your answer here..." data-correct="${block.answer}">
          
          <div class="kc-button-group">
            <button class="submit-answer-btn" onclick="checkUserAnswer(this, '${kcId}')">Submit Answer</button>
            ${block.hint ? `<button class="hint-btn" onclick="toggleHint(this, '${kcId}')">💡 Show Hint</button>` : ""}
          </div>
          
          ${block.hint ? `<div class="hint-container" id="hint-${kcId}"><div class="hint-text"><strong>Hint:</strong> ${block.hint}</div></div>` : ""}
          
          <div class="answer-feedback-container" id="feedback-${kcId}"></div>
        </div>`;
        }

        // IMAGE BLOCK - SKIP (not displayed in preview)
        // Images are intentionally hidden in preview mode
      });

      html += `
      </div>
    </div>`;

      container.innerHTML = html;

      // Restore feedback for already-solved KCs in this class
      cls.blocks.forEach((block, index) => {
        if (block.type === "knowledge") {
          const kcId = `kc-${currentIndex}-${index}`;
          if (solvedKCs.has(kcId)) {
            // This KC was already solved, show the correct feedback but allow re-answering
            const feedbackContainer = document.getElementById(`feedback-${kcId}`);
            const input = document.querySelector(`#${kcId} .answer-input`);
            if (feedbackContainer && input) {
              feedbackContainer.innerHTML = `<div class="answer-feedback correct">✓ Correct! Well done!</div>`;
              input.style.borderColor = "#10b981";
              input.style.boxShadow = "0 0 12px rgba(16, 185, 129, 0.3)";
            }
          }
        }
      });

      // Update button states
      document.getElementById("prevBtn").disabled = currentIndex === 0;
      document.getElementById("currentClass").textContent = currentIndex + 1;

      // Disable next button if there are unsolved knowledge checks
      const nextBtn = document.getElementById("nextBtn");
      const exitBtn = document.getElementById("exitBtn");
      const completeBtn = document.getElementById("completeBtn");
      const hasUnsolvedKCs = totalKCs > 0 && solvedKCs.size < totalKCs;

      if (currentIndex === classes.length - 1) {
        // Last class - show complete button only after all questions answered
        nextBtn.style.display = "none";
        exitBtn.disabled = false;
        exitBtn.style.opacity = "1";
        exitBtn.style.cursor = "pointer";
        exitBtn.title = "";

        // Show complete button only if ALL questions answered (or no questions exist)
        if (!hasUnsolvedKCs) {
          completeBtn.removeAttribute("style");
          completeBtn.style.display = "flex";
          completeBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
          completeBtn.style.gap = "8px";
        } else {
          completeBtn.style.display = "none";
        }
      } else {
        // Not last class - hide complete button
        nextBtn.style.display = "inline-block";
        completeBtn.style.display = "none";
        exitBtn.disabled = false;
        exitBtn.style.opacity = "1";
        exitBtn.style.cursor = "pointer";
        exitBtn.title = "";

        if (hasUnsolvedKCs) {
          nextBtn.disabled = true;
          nextBtn.style.opacity = "0.5";
          nextBtn.style.cursor = "not-allowed";
          nextBtn.title = "Complete all questions before proceeding";
        } else {
          nextBtn.disabled = false;
          nextBtn.style.opacity = "1";
          nextBtn.style.cursor = "pointer";
          nextBtn.title = "";
        }
      }
    }

    /* ================= NAVIGATION ================= */
    function nextClass() {
      if (currentIndex < classes.length - 1) {
        // Mark current class as completed when moving to next
        completedClasses.add(currentIndex);
        savedProgressPercentage = 0; // Reset to recalculate from completedClasses

        // Add transition effect
        const container = document.getElementById("classContainer");
        container.classList.add("transitioning");

        setTimeout(() => {
          currentIndex++;
          container.classList.remove("transitioning");
          renderClass();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 500);
      }
    }

    function prevClass() {
      if (currentIndex > 0) {
        savedProgressPercentage = 0; // Reset to recalculate from completedClasses
        // Add transition effect
        const container = document.getElementById("classContainer");
        container.classList.add("transitioning");

        setTimeout(() => {
          currentIndex--;
          container.classList.remove("transitioning");
          renderClass();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 500);
      }
    }

    function goBack() {
      const backBtn = document.querySelector('.actions .btn.back');
      backBtn.classList.add('animating');

      setTimeout(() => {
        window.location.href = "/admin/tutorials";
      }, 500);
    }

    function exitTutorial() {
      // Mark last class as completed when exiting
      completedClasses.add(currentIndex);
      savedProgressPercentage = 0; // Reset to recalculate from completedClasses

      // Calculate and save progress before showing exit modal
      let cumulativeProgress = 0;
      completedClasses.forEach(idx => {
        cumulativeProgress += (classes[idx].progress_percentage || 0);
      });
      cumulativeProgress = Math.min(cumulativeProgress, 100);

      console.log("exitTutorial - saving progress:", cumulativeProgress + "%");

      // Save progress immediately (note: admin preview may not save to DB, but keeping for consistency)

      // Show exit timer with countdown
      const exitTimer = document.getElementById('exitTimer');
      const exitBtn = document.getElementById('exitBtn');
      const countdownNum = document.getElementById('countdownNum');
      const progressCircle = document.getElementById('progressCircle');

      // Position timer right next to the exit button
      if (exitBtn) {
        const rect = exitBtn.getBoundingClientRect();
        exitTimer.style.position = 'fixed';
        exitTimer.style.top = (rect.top - 5) + 'px';
        exitTimer.style.left = (rect.right + 38) + 'px';
        exitTimer.style.right = 'auto';
        exitTimer.style.bottom = 'auto';
      }

      exitTimer.classList.add('show');

      let count = 2;
      countdownNum.textContent = count;
      const circumference = 113.097;
      progressCircle.style.strokeDashoffset = circumference;

      let elapsed = 0;
      const interval = 500;
      const duration = 2000;

      const countdownInterval = setInterval(() => {
        elapsed += interval;
        const progress = elapsed / duration;
        progressCircle.style.strokeDashoffset = circumference * (1 - progress);

        if (elapsed >= duration) {
          clearInterval(countdownInterval);
          window.location.href = "/admin/tutorials";
        } else if (elapsed >= 1000 && count === 2) {
          count = 1;
          countdownNum.textContent = count;
        }
      }, interval);
    }

    function completeTutorial() {
      // Show congratulations modal
      const congratsModal = document.getElementById('congratsModal');
      congratsModal.classList.add('show');

      // Redirect after 3 seconds
      setTimeout(() => {
        window.location.href = "/admin/tutorials";
      }, 3000);
    }

    /* ================= KNOWLEDGE CHECK FUNCTIONS ================= */
    function calculateSimilarity(str1, str2) {
      const longer = str1.length > str2.length ? str1 : str2;
      const shorter = str1.length > str2.length ? str2 : str1;

      if (longer.length === 0) {
        return 100.0;
      }

      const editDistance = getLevenshteinDistance(longer, shorter);
      return ((longer.length - editDistance) / longer.length) * 100;
    }

    function getLevenshteinDistance(s1, s2) {
      const costs = [];
      for (let i = 0; i <= s1.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= s2.length; j++) {
          if (i === 0) {
            costs[j] = j;
          } else if (j > 0) {
            let newValue = costs[j - 1];
            if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
              newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
            }
            costs[j - 1] = lastValue;
            lastValue = newValue;
          }
        }
        if (i > 0) costs[s2.length] = lastValue;
      }
      return costs[s2.length];
    }

    function toggleHint(btn, kcId) {
      const hintContainer = document.getElementById(`hint-${kcId}`);

      if (hintContainer) {
        hintContainer.classList.toggle("show");

        // Update button text
        if (hintContainer.classList.contains("show")) {
          btn.textContent = "💡 Hide Hint";
        } else {
          btn.textContent = "💡 Show Hint";
        }
      }
    }

    function checkUserAnswer(btn, kcId) {
      const kcContainer = document.getElementById(kcId);
      const input = kcContainer.querySelector(".answer-input");
      const feedbackContainer = kcContainer.querySelector(".answer-feedback-container");

      const userAnswer = input.value.trim().toLowerCase();
      const correctAnswer = input.getAttribute("data-correct").trim().toLowerCase();

      if (!userAnswer) {
        feedbackContainer.innerHTML = `<div class="answer-feedback incorrect">Please enter an answer first.</div>`;
        return;
      }

      // Clear previous feedback
      feedbackContainer.innerHTML = "";

      // Check if answer is exactly correct
      if (userAnswer === correctAnswer) {
        feedbackContainer.innerHTML = `<div class="answer-feedback correct">✓ Correct! Well done!</div>`;
        input.style.borderColor = "#10b981";
        input.style.boxShadow = "0 0 12px rgba(16, 185, 129, 0.3)";

        // Mark this KC as solved
        solvedKCs.add(kcId);

        // Count total KCs in current class
        const cls = classes[currentIndex];
        let totalKCs = 0;
        cls.blocks.forEach(block => {
          if (block.type === "knowledge") {
            totalKCs++;
          }
        });

        // Enable next/exit button if all KCs are solved
        if (solvedKCs.size === totalKCs) {
          if (currentIndex === classes.length - 1) {
            // Last class - enable Exit button and show Complete button
            const exitBtn = document.getElementById("exitBtn");
            exitBtn.disabled = false;
            exitBtn.style.opacity = "1";
            exitBtn.style.cursor = "pointer";
            exitBtn.title = "";

            // Show complete button on last class when all questions answered
            const completeBtn = document.getElementById("completeBtn");
            completeBtn.removeAttribute("style");
            completeBtn.style.display = "flex";
            completeBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
            completeBtn.style.gap = "8px";
            console.log("All questions answered on last class - SHOWING complete button");
          } else if (currentIndex < classes.length - 1) {
            // Not last class - enable Next button
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.disabled = false;
            nextBtn.style.opacity = "1";
            nextBtn.style.cursor = "pointer";
            nextBtn.title = "";
          }
        }
      } else {
        // Check similarity for spelling mistakes
        const similarity = calculateSimilarity(userAnswer, correctAnswer);

        if (similarity >= 75) {
          // Similar answer - likely just spelling mistakes
          feedbackContainer.innerHTML = `<div class="answer-feedback spelling-error">⚠ Check Spelling! The answer is close but not quite right. Correct answer: <strong>${correctAnswer}</strong></div>`;
          input.style.borderColor = "#f59e0b";
          input.style.boxShadow = "0 0 12px rgba(245, 158, 11, 0.3)";
        } else {
          // Completely wrong answer
          feedbackContainer.innerHTML = `<div class="answer-feedback incorrect">✗ Incorrect. The correct answer is: <strong>${correctAnswer}</strong></div>`;
          input.style.borderColor = "#ef4444";
          input.style.boxShadow = "0 0 12px rgba(239, 68, 68, 0.3)";
        }
      }
    }

    loadTutorial();
  </script>
