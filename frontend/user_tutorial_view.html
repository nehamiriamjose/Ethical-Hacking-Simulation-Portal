<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tutorial Viewer</title>

<link rel="stylesheet" href="/static/css/base.css?v=8">
<link rel="stylesheet" href="/static/css/dashboard.css?v=8">
<link rel="stylesheet" href="/static/css/admin_dashboard.css?v=8">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.content-card {
  background:#0b0f14;
  border-radius:14px;
  padding:24px;
  margin-top:20px;
}

.actions {
  margin-top:0;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  position: fixed;
  top: 50px;
  right: 0;
  left: 250px;
  z-index: 99;
  background: #0a0d12;
  padding: 10px 28px;
  border-bottom: 1px solid rgba(14,165,233,.15);
}

@keyframes slideOutLeft {
  0% {
    opacity: 1;
    transform: translateX(0);
  }
  100% {
    opacity: 0;
    transform: translateX(-40px);
  }
}

.btn {
  padding:12px 18px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}

.btn:active {
  transform: scale(0.95);
}

.btn.back {
  background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
  color: #e5e7eb;
  border: 1px solid rgba(14,165,233,.2);
  position: relative;
  overflow: hidden;
}

.btn.back::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
  transition: left 0.4s ease;
  pointer-events: none;
}

.btn.back:hover::before {
  left: 100%;
}

.btn.back.animating {
  animation: slideOutLeft 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.btn.save.animating {
  animation: slideOutLeft 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

/* ========== EXIT MODAL ========== */
#exitModal {
  position: fixed;
  display: none;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 15px;
  z-index: 9999;
  animation: slideInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

#exitModal.show {
  display: flex;
}

@keyframes slideInUp {
  0% {
    opacity: 0;
    transform: translateY(30px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.exit-text {
  font-size: 16px;
  color: #14f1b2;
  font-weight: 700;
  letter-spacing: 1px;
}

.exit-circle {
  width: 50px;
  height: 50px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.exit-circle svg {
  transform: rotate(-90deg);
}

.exit-circle-bg {
  fill: none;
  stroke: rgba(20, 241, 178, 0.2);
  stroke-width: 3;
}

.exit-circle-progress {
  fill: none;
  stroke: #14f1b2;
  stroke-width: 3;
  stroke-dasharray: 113.097;
  stroke-dashoffset: 113.097;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(20, 241, 178, 0.6));
}

.exit-modal-content .countdown {
  position: absolute;
  font-size: 20px;
  color: #14f1b2;
  font-weight: 800;
  font-family: 'Courier New', monospace;
  text-shadow: 0 0 20px rgba(20, 241, 178, 0.6);
}

/* CONGRATULATIONS MODAL */
#congratsModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  animation: fadeIn 0.3s ease-in-out;
}

#congratsModal.show {
  display: flex;
}

.congrats-content {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(10, 13, 18, 0.9) 100%);
  border: 2px solid rgba(16, 185, 129, 0.4);
  border-radius: 20px;
  padding: 50px 60px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  animation: slideInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), pulse 2s ease-in-out infinite;
}

.congrats-icon {
  font-size: 80px;
  margin-bottom: 20px;
  animation: bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.congrats-content h2 {
  font-size: 36px;
  color: #10b981;
  margin: 0 0 15px 0;
  font-weight: 700;
  letter-spacing: 1px;
}

.congrats-content p {
  font-size: 16px;
  color: #d1d5db;
  margin: 0 0 30px 0;
}

.congrats-stars {
  font-size: 40px;
  letter-spacing: 10px;
  animation: starPulse 0.8s ease-in-out;
}

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes bounce {
  0% {
    transform: translateY(-30px);
    opacity: 0;
  }
  50% {
    transform: translateY(10px);
  }
  100% {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes starPulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.2);
  }
}

.add { background:#0ea5e9; color:#000; }
.save { background:#14f1b2; color:#000; }

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.kc-box, .content-box {
  margin-top:16px;
  padding:16px;
  border-radius:12px;
  background:rgba(20,241,178,.05);
  border:1px solid rgba(20,241,178,.2);
}

.result { margin-top:8px; font-weight:bold; }
.correct { color:#14f1b2; }
.wrong { color:#ff6b6b; }

/* IMAGE BLOCK STYLING */
.image-block {
  display:flex;
  gap:20px;
  margin-top:16px;
  padding:16px;
  border-radius:12px;
  background:rgba(20,241,178,.05);
  border:1px solid rgba(20,241,178,.2);
  align-items:flex-start;
  flex-direction: row;
}

.image-block.image-left { flex-direction: row; }
.image-block.image-right { flex-direction: row-reverse; }

.image-box {
  flex:0 0 40%;
  min-height:250px;
  border-radius:8px;
  overflow:hidden;
  background:#121821;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px dashed #1f2937;
}

.image-box img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.image-desc {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.class-counter {
  background: rgba(20,241,178,.1);
  border: 1px solid rgba(20,241,178,.2);
  padding: 12px 16px;
  border-radius: 8px;
  color: #14f1b2;
  font-weight: 600;
  text-align: center;
  min-width: 120px;
}

.nav-section {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.content-card h3 {
  margin: 0 0 16px 0;
  font-size: 18px;
  font-weight: 600;
  color: #14f1b2;
}

.flow-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.content-box p {
  margin: 0;
  line-height: 1.6;
  color: #e5e7eb;
}

.image-description {
  color: #e5e7eb;
  line-height: 1.6;
  font-size: 15px;
}

.main {
  padding: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  position: relative;
}

.topbar {
  margin-bottom: 0;
  position: fixed;
  top: 0;
  right: 0;
  left: 250px;
  z-index: 100;
  background: #0a0d12;
  padding: 14px 28px;
}

.topbar h1 {
  font-size: 28px;
  font-weight: 600;
  color: #14f1b2;
  margin: 0;
}

/* ANIMATIONS */
@keyframes slideIn {
  0% {
    opacity: 0;
    transform: translateY(30px);
  }
  60% {
    opacity: 0.8;
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeOut {
  0% {
    opacity: 1;
    transform: translateY(0);
  }
  100% {
    opacity: 0;
    transform: translateY(-20px);
  }
}

.content-card {
  animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

#classContainer {

  padding-top: 170px;
}

#classContainer.transitioning .content-card {
  animation: fadeOut 0.5s cubic-bezier(0.42, 0, 1, 1);
}

/* PROGRESS TRACKER */
#progressContainer {
  position: fixed;
  top: 105px;
  right: 0;
  left: 250px;
  z-index: 99;
  background: #0a0d12;
  padding: 12px 28px;
}

.progress-section {
  margin-top: 0;
  padding: 0;
  border-radius: 0;
  background: transparent;
  border: none;
  animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.progress-section label {
  display: block;
  color: #0ea5e9;
  font-weight: 600;
  margin-bottom: 6px;
  font-size: 13px;
}

.progress-display {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
}

.progress-bar {
  flex: 1;
  height: 8px;
  background: #1f2937;
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0ea5e9, #14f1b2);
  width: 0%;
  transition: width 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 0 10px rgba(20, 241, 178, 0.5);
}

.progress-percentage {
  color: #0ea5e9;
  font-weight: 600;
  font-size: 14px;
  min-width: 45px;
  text-align: right;
  transition: all 0.6s ease-out;
}

/* INTERACTIVE KC STYLING */
.kc-interactive {

  background: rgba(14,165,233,.08);
  border: 1px solid rgba(14,165,233,.2);

  animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.kc-question {

}

.question-label {

}

.answer-input {

  border-radius: 8px;

}

.kc-button-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.hint-btn {
  padding: 10px 16px;
  background: #f59e0b;
  color: #000;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.hint-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(245, 158, 11, 0.3);
}

.hint-btn:active {
  transform: scale(0.95);
}

.hint-container {
  margin-top: 12px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.hint-container.show {

}

.hint-text {
  padding: 12px 16px;
  background: rgba(245, 158, 11, 0.1);

  border-radius: 6px;
  color: #fcd34d;
  font-size: 14px;
  line-height: 1.6;
}

.submit-answer-btn {
  padding: 10px 16px;
  background: #14f1b2;
  color: #000;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.submit-answer-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(20, 241, 178, 0.3);
}

.submit-answer-btn:active {
  transform: scale(0.95);
}

.answer-feedback {
  margin-top: 12px;
  padding: 12px 16px;

}

.answer-feedback.correct {
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid #10b981;
  color: #10b981;
}

.answer-feedback.incorrect {

  color: #fca5a5;
}

.answer-feedback.spelling-error {
  background: rgba(245, 158, 11, 0.15);
  border: 1px solid #f59e0b;

/* CLASS LIST STYLES */
.class-list-container {

}

.class-list-header {

.class-list {

}

.class-item {

}

.class-item:hover {

}

.class-item.active {

.class-item.completed {

}

.class-item.completed::before {

</style>

  <h1>Tutorial Viewer</h1>

  <button id="prevBtn" class="btn back" onclick="prevClass()">⬅ Previous Class</button>

    <h2>Congratulations!</h2>
    <p>You've completed this tutorial!</p>
    <div class="congrats-stars">⭐ ⭐ ⭐</div>
  </div>
</div>

</div>

<script>
let classes = [];
let currentIndex = 0;
let completedClasses = new Set();
let savedProgressPercentage = 0; // Stores progress percentage loaded from database
let solvedKCs = new Set();
let solvedKCsPerClass = {}; // Track solved KCs for each class to preserve progress when navigating
let isNavigatingAway = false; // Flag to prevent duplicate saves on page exit

const pathParts = window.location.pathname.split("/");
const tutorialId = pathParts[pathParts.length - 1];

// Extract email from URL parameters
const urlParams = new URLSearchParams(window.location.search);
const userEmail = urlParams.get("email") || "";

// Update sidebar links with email
document.querySelectorAll(".menu a").forEach(link => {
  const href = link.getAttribute("href");
  if (href) {
    link.setAttribute("href", href.replace(/{{EMAIL}}/g, userEmail));
  }
});

/* LOAD DATA */
async function loadTutorial() {
  try {
    console.log("Loading tutorial with ID:", tutorialId);
    const res = await fetch(`/admin/tutorials/${tutorialId}/classes`);
    console.log("Response status:", res.status);
    
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: Failed to load tutorial`);
    }
    
    const data = await res.json();
    console.log("Received data:", data);
    
    classes = data.classes || [];
    
    if (classes.length === 0) {
      document.getElementById("classContainer").innerHTML = "<p style='color: #ff6b6b; padding: 20px;'>❌ No classes available for this tutorial. Please contact the administrator.</p>";
      return;
    }
    
    document.getElementById("totalClasses").textContent = classes.length;
    
    // Load saved progress from database
    try {
      const progressRes = await fetch(`/user/tutorials/${tutorialId}/progress?email=${userEmail}`);
      if (progressRes.ok) {
        const progressData = await progressRes.json();
        console.log("Loaded saved progress:", progressData);
        
        // Jump to saved class index if valid
        if (progressData.current_class_index >= 0 && progressData.current_class_index < classes.length) {
          currentIndex = progressData.current_class_index;
          console.log("Resuming from class index:", currentIndex);
          
          // Store the saved progress value to display without recalculating
          savedProgressPercentage = progressData.progress || 0;
          console.log("Loaded saved progress percentage:", savedProgressPercentage);
        }
      }
    } catch (err) {
      console.log("No saved progress found, starting from beginning:", err.message);
    }
    
    renderClass();
    renderClassList();
  } catch (err) {
    console.error("Error loading tutorial:", err);
    document.getElementById("classContainer").innerHTML = `<p style='color: #ff6b6b; padding: 20px;'>❌ Error loading tutorial data: ${err.message}</p>`;
  }
}

/* RENDER PROGRESS BAR */
function renderProgressBar() {
  const progressContainer = document.getElementById("progressContainer");
  
  // If we have saved progress from the database, use it; otherwise calculate from completedClasses
  let cumulativeProgress = 0;
  
  if (savedProgressPercentage > 0) {
    // Use saved progress percentage
    cumulativeProgress = savedProgressPercentage;
    console.log("Using saved progress percentage:", cumulativeProgress);
  } else {
    // Calculate cumulative progress from ONLY completed classes
    // Sum the progress_percentage values set by admin for completed classes
    completedClasses.forEach(classIndex => {
      cumulativeProgress += (classes[classIndex].progress_percentage || 0);
    });
    console.log("Calculated progress from completed classes:", cumulativeProgress);
  }
  
  cumulativeProgress = Math.min(cumulativeProgress, 100);

  if (progressContainer.innerHTML === '') {
    const progressHTML = `
      <div class="progress-section">
        <label>📊 Progress: <span class="progress-value">${cumulativeProgress}</span>%</label>
        <div class="progress-display">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${cumulativeProgress}%"></div>
          </div>
          <span class="progress-percentage">${cumulativeProgress}%</span>
        </div>
      </div>
    `;
    progressContainer.innerHTML = progressHTML;
  } else {
    const progressFill = progressContainer.querySelector(".progress-fill");
    const progressValue = progressContainer.querySelector(".progress-value");
    const progressPercentage = progressContainer.querySelector(".progress-percentage");
    
    if (progressFill) {
      progressFill.style.width = cumulativeProgress + "%";
    }
    if (progressValue) {
      progressValue.textContent = cumulativeProgress;
    }
    if (progressPercentage) {
      progressPercentage.textContent = cumulativeProgress + "%";
    }
  }
}

/* RENDER CLASS LIST IN SIDEBAR */
function renderClassList() {
  const classListContainer = document.getElementById("classListSidebar");
  if (!classListContainer) return;
  
  classListContainer.innerHTML = '';
  
  classes.forEach((cls, index) => {
    const classItem = document.createElement('div');
    classItem.className = 'class-item';
    
    if (index === currentIndex) {
      classItem.classList.add('active');
    }
    
    if (completedClasses.has(index)) {
      classItem.classList.add('completed');
    }
    
    classItem.textContent = `Class ${index + 1}: ${cls.title || 'Untitled'}`;
    classItem.onclick = () => {
      completedClasses.add(currentIndex);
      currentIndex = index;
      renderClass();
      renderClassList();
      renderProgressBar();
      saveProgress(index);
    };
    
    classListContainer.appendChild(classItem);
  });
}

/* RENDER CLASS */
function renderClass() {
  const container = document.getElementById("classContainer");
  const cls = classes[currentIndex];
  
  if (!cls) return;

  // Initialize solvedKCs for this class if not already done
  const classKey = `class-${currentIndex}`;
  if (!solvedKCsPerClass[classKey]) {
    solvedKCsPerClass[classKey] = new Set();
  }
  
  // Restore solvedKCs from the per-class tracking
  solvedKCs = solvedKCsPerClass[classKey];
  
  let totalKCs = 0;
  cls.blocks.forEach(block => {
    if (block.type === "knowledge") {
      totalKCs++;
    }
  });

  renderProgressBar();

  let html = `
    <div class="content-card">
      <h3>${cls.title}</h3>
      
      <div class="flow-container">`;

  cls.blocks.forEach((block, index) => {
    if (block.type === "content") {
      html += `<div class="content-box"><p>${block.text}</p></div>`;
    }

    if (block.type === "knowledge") {
      const kcId = `kc-${currentIndex}-${index}`;
      html += `
        <div class="kc-interactive" id="${kcId}">
          <div class="question-label">📚 Question</div>
          <div class="kc-question">${block.text}</div>
          
          <input type="text" class="answer-input" placeholder="Type your answer here..." data-correct="${block.answer}">
          
          <div class="kc-button-group">
            <button class="submit-answer-btn" onclick="checkUserAnswer(this, '${kcId}')">Submit Answer</button>
            ${block.hint ? `<button class="hint-btn" onclick="toggleHint(this, '${kcId}')">💡 Show Hint</button>` : ""}
          </div>
          
          ${block.hint ? `<div class="hint-container" id="hint-${kcId}"><div class="hint-text"><strong>Hint:</strong> ${block.hint}</div></div>` : ""}
          
          <div class="answer-feedback-container" id="feedback-${kcId}"></div>
        </div>`;
    }

    if (block.type === "image") {
      html += `
        <div class="image-block image-${block.position}">
          <div class="image-box">
            <img src="${block.image_url}">
          </div>
          <div class="image-desc">
            <p>${block.description || ""}</p>
          </div>
        </div>`;
    }
  });

  html += `
      </div>
    </div>`;

  container.innerHTML = html;
  
  // Restore feedback for already-solved KCs in this class
  cls.blocks.forEach((block, index) => {
    if (block.type === "knowledge") {
      const kcId = `kc-${currentIndex}-${index}`;
      if (solvedKCs.has(kcId)) {
        // This KC was already solved, show the correct feedback but allow re-answering
        const feedbackContainer = document.getElementById(`feedback-${kcId}`);
        const input = document.querySelector(`#${kcId} .answer-input`);
        if (feedbackContainer && input) {
          feedbackContainer.innerHTML = `<div class="answer-feedback correct">✓ Correct! Well done!</div>`;
          input.style.borderColor = "#10b981";
          input.style.boxShadow = "0 0 12px rgba(16, 185, 129, 0.3)";
        }
      }
    }
  });
  
  document.getElementById("prevBtn").disabled = currentIndex === 0;
  document.getElementById("currentClass").textContent = currentIndex + 1;
  
  const nextBtn = document.getElementById("nextBtn");
  const exitBtn = document.getElementById("exitBtn");
  const completeBtn = document.getElementById("completeBtn");
  const hasUnsolvedKCs = totalKCs > 0 && solvedKCs.size < totalKCs;
  
  console.log("renderClass called - currentIndex:", currentIndex, "classes.length:", classes.length, "totalKCs:", totalKCs, "solvedKCs.size:", solvedKCs.size);
  
  if (currentIndex === classes.length - 1) {
    // Last class
    nextBtn.style.display = "none";
    exitBtn.disabled = false;
    exitBtn.style.opacity = "1";
    exitBtn.style.cursor = "pointer";
    exitBtn.title = "";
    
    // Show complete button only if ALL questions answered (or no questions exist)
    if (!hasUnsolvedKCs) {
      console.log("SHOWING COMPLETE BUTTON - all questions answered");
      completeBtn.removeAttribute("style");
      completeBtn.style.display = "flex";
      completeBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
      completeBtn.style.gap = "8px";
    } else {
      console.log("HIDING COMPLETE BUTTON - questions unsolved. hasUnsolvedKCs:", hasUnsolvedKCs);
      completeBtn.style.display = "none";
    }
  } else {
    // Not last class
    nextBtn.style.display = "inline-block";
    completeBtn.style.display = "none";
    exitBtn.disabled = false;
    exitBtn.style.opacity = "1";
    exitBtn.style.cursor = "pointer";
    exitBtn.title = "";
    
    if (hasUnsolvedKCs) {
      nextBtn.disabled = true;
      nextBtn.style.opacity = "0.5";
      nextBtn.style.cursor = "not-allowed";
      nextBtn.title = "Complete all questions before proceeding";
    } else {
      nextBtn.disabled = false;
      nextBtn.style.opacity = "1";
      nextBtn.style.cursor = "pointer";
      nextBtn.title = "";
    }
  }
}

/* NAVIGATION */
function nextClass() {
  if (currentIndex < classes.length - 1) {
    completedClasses.add(currentIndex);
    savedProgressPercentage = 0; // Reset to recalculate from completedClasses
    
    const container = document.getElementById("classContainer");
    container.classList.add("transitioning");
    
    // Save progress before moving to next class
    saveProgress(currentIndex + 1);
    
    setTimeout(() => {
      currentIndex++;
      container.classList.remove("transitioning");
      renderClass();
      renderClassList();
      renderProgressBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 500);
  }
}

function prevClass() {
  if (currentIndex > 0) {
    savedProgressPercentage = 0; // Reset to recalculate from completedClasses
    const container = document.getElementById("classContainer");
    container.classList.add("transitioning");
    
    // Save progress before moving to previous class
    saveProgress(currentIndex - 1);
    
    setTimeout(() => {
      currentIndex--;
      container.classList.remove("transitioning");
      renderClass();
      renderClassList();
      renderProgressBar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 500);
  }
}

function goBack() {
  isNavigatingAway = true;
  const backBtn = document.querySelector('.actions .btn.back');
  backBtn.classList.add('animating');
  
  setTimeout(() => {
    window.location.href = `/user/tutorials?email=${userEmail}`;
  }, 500);
}

function exitTutorial() {
  completedClasses.add(currentIndex);
  savedProgressPercentage = 0; // Reset to recalculate from completedClasses
  
  // Calculate progress based on admin-set progress_percentage values
  let cumulativeProgress = 0;
  completedClasses.forEach(idx => {
    cumulativeProgress += (classes[idx].progress_percentage || 0);
  });
  cumulativeProgress = Math.min(cumulativeProgress, 100);
  
  console.log("exitTutorial - saving progress:", cumulativeProgress + "%");
  
  // Save progress immediately
  const url = `/user/tutorials/${tutorialId}/progress`;
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: userEmail,
      current_class_index: currentIndex,
      progress_percentage: cumulativeProgress
    })
  }).catch(err => console.warn("Error saving progress:", err));
  
  // Show exit modal with countdown
  const exitModal = document.getElementById('exitModal');
  const exitBtn = document.getElementById('exitBtn');
  const countdownNum = document.getElementById('countdownNum');
  const progressCircle = document.getElementById('progressCircle');
  
  // Position modal right next to the exit button
  if (exitBtn) {
    const rect = exitBtn.getBoundingClientRect();
    exitModal.style.position = 'fixed';
    exitModal.style.top = (rect.top - 5) + 'px';
    exitModal.style.left = (rect.right + 38) + 'px';
    exitModal.style.right = 'auto';
    exitModal.style.bottom = 'auto';
  }
  
  exitModal.classList.add('show');
  
  let count = 2;
  countdownNum.textContent = count;
  const circumference = 113.097;
  progressCircle.style.strokeDashoffset = circumference;
  
  let elapsed = 0;
  const interval = 500;
  const duration = 2000;
  
  const countdownInterval = setInterval(() => {
    elapsed += interval;
    const progress = elapsed / duration;
    progressCircle.style.strokeDashoffset = circumference * (1 - progress);
    
    if (elapsed >= duration) {
      clearInterval(countdownInterval);
      window.location.href = `/user/tutorials?email=${userEmail}`;
    } else if (elapsed >= 1000 && count === 2) {
      count = 1;
      countdownNum.textContent = count;
    }
  }, interval);
}

/* SAVE PROGRESS */
async function saveProgress(classIndex) {
  try {
    // Calculate progress based on admin-set progress_percentage values
    // Sum the progress_percentage for completed classes only
    let cumulativeProgress = 0;
    
    completedClasses.forEach(idx => {
      cumulativeProgress += (classes[idx].progress_percentage || 0);
    });
    
    cumulativeProgress = Math.min(cumulativeProgress, 100);
    
    console.log("Saving progress - classIndex:", classIndex, "completedClasses:", Array.from(completedClasses), "progress:", cumulativeProgress + "%");
    
    const response = await fetch(`/user/tutorials/${tutorialId}/progress`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: userEmail,
        current_class_index: classIndex,
        progress_percentage: cumulativeProgress
      })
    });
    
    if (response.ok) {
      const result = await response.json();
      console.log("✓ Progress saved: class", classIndex, "progress", cumulativeProgress + "%");
    } else {
      console.warn("Failed to save progress:", response.status);
    }
  } catch (err) {
    console.warn("Error saving progress:", err.message);
  }
}

function completeTutorial() {
  // Mark all classes as completed
  for (let i = 0; i < classes.length; i++) {
    completedClasses.add(i);
  }
  
  savedProgressPercentage = 0; // Reset to recalculate from completedClasses
  
  // Update progress bar to 100%
  const progressFill = document.querySelector(".progress-fill");
  const progressValue = document.querySelector(".progress-value");
  const progressPercentage = document.querySelector(".progress-percentage");
  
  if (progressFill) {
    progressFill.style.width = "100%";
  }
  if (progressValue) {
    progressValue.textContent = "100";
  }
  if (progressPercentage) {
    progressPercentage.textContent = "100%";
  }
  
  // Update sidebar to show all classes as completed
  renderClassList();
  
  // Save completion with 100% progress
  try {
    const url = `/user/tutorials/${tutorialId}/progress`;
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: userEmail,
        current_class_index: classes.length - 1,
        progress_percentage: 100
      })
    });
  } catch (err) {
    console.warn("Error saving completion:", err.message);
  }
  
  // Show congratulations modal
  const congratsModal = document.getElementById('congratsModal');
  congratsModal.classList.add('show');
  
  // Redirect after 3 seconds
  setTimeout(() => {
    isNavigatingAway = true;
    // Redirect back to tutorials list with email, and add refresh flag
    window.location.href = `/user/tutorials?email=${userEmail}&refreshDashboard=true`;
  }, 3000);
}

/* SIMILARITY CALCULATION */
function calculateSimilarity(str1, str2) {
  const longer = str1.length > str2.length ? str1 : str2;
  const shorter = str1.length > str2.length ? str2 : str1;
  
  if (longer.length === 0) {
    return 100.0;
  }
  
  const editDistance = getLevenshteinDistance(longer, shorter);
  return ((longer.length - editDistance) / longer.length) * 100;
}

function getLevenshteinDistance(s1, s2) {
  const costs = [];
  for (let i = 0; i <= s1.length; i++) {
    let lastValue = i;
    for (let j = 0; j <= s2.length; j++) {
      if (i === 0) {
        costs[j] = j;
      } else if (j > 0) {
        let newValue = costs[j - 1];
        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
          newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
        }
        costs[j - 1] = lastValue;
        lastValue = newValue;
      }
    }
    if (i > 0) costs[s2.length] = lastValue;
  }
  return costs[s2.length];
}

function toggleHint(btn, kcId) {
  const hintContainer = document.getElementById(`hint-${kcId}`);
  
  if (hintContainer) {
    hintContainer.classList.toggle("show");
    
    if (hintContainer.classList.contains("show")) {
      btn.textContent = "💡 Hide Hint";
    } else {
      btn.textContent = "💡 Show Hint";
    }
  }
}

function checkUserAnswer(btn, kcId) {
  const kcContainer = document.getElementById(kcId);
  const input = kcContainer.querySelector(".answer-input");
  const feedbackContainer = kcContainer.querySelector(".answer-feedback-container");
  
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = input.getAttribute("data-correct").trim().toLowerCase();
  
  if (!userAnswer) {
    feedbackContainer.innerHTML = `<div class="answer-feedback incorrect">Please enter an answer first.</div>`;
    return;
  }
  
  feedbackContainer.innerHTML = "";
  
  if (userAnswer === correctAnswer) {
    feedbackContainer.innerHTML = `<div class="answer-feedback correct">✓ Correct! Well done!</div>`;
    input.style.borderColor = "#10b981";
    input.style.boxShadow = "0 0 12px rgba(16, 185, 129, 0.3)";
    
    solvedKCs.add(kcId);
    
    const cls = classes[currentIndex];
    let totalKCs = 0;
    cls.blocks.forEach(block => {
      if (block.type === "knowledge") {
        totalKCs++;
      }
    });
    
    if (solvedKCs.size === totalKCs) {
      if (currentIndex === classes.length - 1) {
        const exitBtn = document.getElementById("exitBtn");
        exitBtn.disabled = false;
        exitBtn.style.opacity = "1";
        exitBtn.style.cursor = "pointer";
        exitBtn.title = "";
        
        // Show complete button on last class when all questions answered
        const completeBtn = document.getElementById("completeBtn");
        completeBtn.removeAttribute("style");
        completeBtn.style.display = "flex";
        completeBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
        completeBtn.style.gap = "8px";
        console.log("All questions answered on last class - SHOWING complete button");
      } else if (currentIndex < classes.length - 1) {
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
        nextBtn.style.cursor = "pointer";
        nextBtn.title = "";
      }
    }
  } else {
    const similarity = calculateSimilarity(userAnswer, correctAnswer);
    
    if (similarity >= 75) {
      feedbackContainer.innerHTML = `<div class="answer-feedback spelling-error">⚠ Check Spelling! The answer is close but not quite right. Correct answer: <strong>${correctAnswer}</strong></div>`;
      input.style.borderColor = "#f59e0b";
      input.style.boxShadow = "0 0 12px rgba(245, 158, 11, 0.3)";
    } else {
      feedbackContainer.innerHTML = `<div class="answer-feedback incorrect">✗ Incorrect. The correct answer is: <strong>${correctAnswer}</strong></div>`;
      input.style.borderColor = "#ef4444";
      input.style.boxShadow = "0 0 12px rgba(239, 68, 68, 0.3)";
    }
  }
}

loadTutorial();

// Auto-save progress when user leaves the page
window.addEventListener('beforeunload', () => {
  // Don't save progress if we're navigating away intentionally (e.g., from completeTutorial or goBack)
  if (isNavigatingAway) {
    return;
  }
  
  if (currentIndex >= 0 && currentIndex < classes.length) {
    // Get the ACTUAL progress percentage from the progress bar
    const progressPercentageElement = document.querySelector(".progress-percentage");
    let cumulativeProgress = 0;
    
    if (progressPercentageElement) {
      cumulativeProgress = parseInt(progressPercentageElement.textContent) || 0;
    }
    
    console.log("Saving progress on exit - classIndex:", currentIndex, "progress:", cumulativeProgress);
    
    // Use fetch with keepalive for reliable delivery even if page is closing
    fetch(`/user/tutorials/${tutorialId}/progress`, { 
      method: 'POST',
      keepalive: true,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: userEmail,
        current_class_index: currentIndex,
        progress_percentage: cumulativeProgress
      })
    }).catch(err => console.log("Progress saved on exit"));
  }
});
