<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Notifications Management</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/admin_dashboard.css">
  <link rel="stylesheet" href="/static/css/admin_notifications.css">
  <link rel="stylesheet" href="/static/css/admin_notifications.css">

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 7, 11, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 234, 255, 0.2);
      border-top-color: #00eaff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Page Transition Animations */
    .sidebar {
      animation: slideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    main {
      animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Content Animations */
    .notification-create {
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      opacity: 0;
    }

    .notifications-list {
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="dashboard-body">

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- ================= ADMIN SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="brand">
      <span class="shield">
        <i data-lucide="shield"></i>
      </span>
      <div>
        <h2>Hacker Portal</h2>
        <p>Learn & Conquer</p>
      </div>
    </div>

    <nav class="menu">
      <a href="/admin/dashboard"><i data-lucide="layout-grid"></i> Dashboard</a>
      <a href="/admin/users"><i data-lucide="users"></i> User Management</a>
      <a href="/admin/challenges"><i data-lucide="target"></i> Challenges</a>
      <a href="/admin/tutorials"><i data-lucide="book-open"></i> Tutorials</a>
      <a href="/admin/quizzes"><i data-lucide="help-circle"></i> Quizzes</a>
      <a href="/admin/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
      <a href="/admin/sandbox"><i data-lucide="cpu"></i> Sandbox Monitor</a>
      <a href="/admin/notifications" class="active"><i data-lucide="bell"></i> Notifications</a>
      <a href="/admin/analytics"><i data-lucide="bar-chart-2"></i> Analytics</a>
    </nav>

    <a class="logout" href="/"><i data-lucide="log-out"></i> Logout</a>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="dashboard-main">

    <!-- TOP BAR -->
    <header class="topbar">
      <h2>Notifications Management</h2>
    </header>

    <!-- CREATE NOTIFICATION -->
    <section class="notification-create">
      <a href="/admin/notifications/create">
        <button class="create-btn" id="openNotificationForm">
          Create Notification
        </button>
      </a>
    </section>

    <section class="notifications-list">
      {{NOTIFICATION_LIST}}
    </section>

    </section>

  </main>

  <script>
    lucide.createIcons();

    function openForm() {
      document.querySelector(".notification-form").classList.toggle("show");
    }
  </script>
  <button class="create-btn glow" onclick="toggleNotificationForm()">
    <script src="/static/js/admin_notifications.js"></script>

</body>

</html>
