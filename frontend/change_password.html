<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Change Password</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dashboard-body">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="brand">
      🛡️ <span>Hacker Portal</span>
      <small>Learn & Conquer</small>
    </div>

    <nav class="menu">
      <a class="active" href="/user/dashboard?email={{EMAIL}}">
        <i data-lucide="layout-grid"></i>
        Dashboard
      </a>

      <a href="/user/tutorials?email={{EMAIL}}">
        <i data-lucide="book-open"></i>
        Tutorials
      </a>

      <a href="/user/tutorials/saved?email={{EMAIL}}">
        <i data-lucide="star"></i>
        Saved Tutorials
      </a>


      <a href="/user/challenges?email={{EMAIL}}">
        <i data-lucide="target"></i>
        Challenges
      </a>

      <a href="/user/quizzes?email={{EMAIL}}">
        <i data-lucide="help-circle"></i>
        Quizzes
      </a>

      <a href="/user/challenges/daily?email={{EMAIL}}">
        <i data-lucide="calendar"></i>
        Daily Challenge
      </a>

      <a href="/user/attempt-history?email={{EMAIL}}">
        <i data-lucide="history"></i>
        Attempt History
      </a>

      <a href="/user/leaderboard?email={{EMAIL}}">
        <i data-lucide="trophy"></i>
        Leaderboard
      </a>

      <a href="/user/friends?email={{EMAIL}}">
        <i data-lucide="users"></i>
        Friends
      </a>



      <a href="/user/progress?email={{EMAIL}}">
        <i data-lucide="trending-up"></i>
        Progress Graph
      </a>

      <a href="/user/profile?email={{EMAIL}}">
        <i data-lucide="user"></i>
        Profile
      </a>
    </nav>
    <a class="logout" href="/">
      <i data-lucide="log-out"></i>
      Logout
    </a>

  </aside>

  <!-- ================= MAIN ================= -->
  <main class="dashboard-main" style="position: relative;">

    <!-- TOP BAR -->
    <header class="topbar">
      <h2>Change Password</h2>
      <div class="top-icons">
        <div class="notif-wrapper">
          <button id="notifBell" class="icon-btn" type="button">
            <i data-lucide="bell"></i>
          </button>
          <div id="notifPanel" class="notif-panel">
            <div class="notif-header">Notifications</div>
            <div id="notifList" class="notif-list">
              <!-- notifications will load here -->
            </div>
          </div>
        </div>
        <div class="profile-chip">
          👤 {{EMAIL}}
        </div>
      </div>
    </header>

    <!-- ✅ TRUE CENTER (ABSOLUTE, UNBREAKABLE) -->
    <div style="
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 520px;
    ">
      <section class="card glow">

        <h3 style="margin-bottom: 20px;">🔒 Update Your Password</h3>

        <form method="post">

          <label class="muted">Email</label>
          <input type="email" name="email" value="{{EMAIL}}" readonly
            style="width:100%; margin-bottom:16px; padding:12px; border-radius:10px;">

          <label class="muted">New Password</label>
          <input type="password" name="new_password" required placeholder="Enter new password"
            style="width:100%; margin-bottom:24px; padding:12px; border-radius:10px;">

          <button class="primary-btn">
            Change Password
          </button>

        </form>

      </section>
    </div>

  </main>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
