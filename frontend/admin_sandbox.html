<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Monitor - Admin</title>

    <!-- GLOBAL -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/admin_dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --accent-teal: #14f1b2;
            --accent-glow: rgba(20, 241, 178, 0.4);
            --bg-darker: #05070b;
            --bg-panel: rgba(10, 15, 20, 0.95);
            --docker-bg: #05070b;
            --docker-sidebar: #0a0f14;
            --docker-header: rgba(10, 15, 20, 0.8);
            --docker-border: rgba(20, 241, 178, 0.15);
            --docker-text: #cccccc;
            --docker-text-dim: #858585;
            --docker-blue: #14f1b2;
            /* Replaced with project teal */
            --docker-blue-hover: #14f1b2;
            --docker-green: #4ade80;
            --docker-red: #ef4444;
            --docker-yellow: #fbbf24;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 11, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(20, 241, 178, 0.2);
            border-top-color: var(--accent-teal);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        body {
            background-color: var(--docker-bg);
            color: var(--docker-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .dashboard-body {
            display: flex;
            height: 100vh;
        }

        /* Sidebar styles from project */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #031b1e, #020c0f);
            border-right: 1px solid var(--docker-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .dashboard-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--docker-bg);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topbar {
            height: 70px;
            background: rgba(10, 15, 20, 0.4);
            border-bottom: 1px solid var(--docker-border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }

        .topbar h2 {
            color: var(--accent-teal);
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        .profile-chip {
            background: rgba(20, 241, 178, 0.12);
            border: 1px solid rgba(20, 241, 178, 0.25);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--accent-teal);
            font-size: 13px;
            font-weight: 600;
        }

        .sandbox-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        /* Stats Cards - Project Style */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(20, 241, 178, 0.08), rgba(20, 241, 178, 0.03));
            border: 1px solid var(--docker-border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(20, 241, 178, 0.4);
            box-shadow: 0 6px 20px rgba(20, 241, 178, 0.1);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 11px;
            color: var(--docker-text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-teal);
        }

        /* Container List Area */
        .containers-section {
            flex: 1;
            overflow-y: auto;
            background: rgba(10, 15, 20, 0.3);
            border: 1px solid var(--docker-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .containers-header {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--docker-border);
        }

        .filter-input {
            background: rgba(12, 18, 24, 0.95);
            border: 1px solid rgba(20, 241, 178, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 13px;
            width: 250px;
        }

        .filter-select {
            background: rgba(12, 18, 24, 0.95);
            border: 1px solid rgba(20, 241, 178, 0.2);
            color: var(--accent-teal);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
        }

        /* Table Look */
        .containers-table {
            width: 100%;
            border-collapse: collapse;
        }

        .containers-table th {
            text-align: left;
            padding: 15px;
            font-size: 11px;
            color: var(--accent-teal);
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 1px solid var(--docker-border);
            background: rgba(5, 7, 11, 0.5);
        }

        .containers-table td {
            padding: 15px;
            font-size: 13px;
            border-bottom: 1px solid var(--docker-border);
        }

        .container-row:hover {
            background: rgba(20, 241, 178, 0.05);
        }

        .container-name {
            font-weight: 600;
            color: white;
        }

        .container-image {
            font-size: 11px;
            color: var(--docker-text-dim);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-running {
            color: var(--docker-green);
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-running .status-dot {
            background: var(--docker-green);
            box-shadow: 0 0 5px var(--docker-green);
        }

        .status-stopped {
            color: var(--docker-text-dim);
            background: rgba(133, 133, 133, 0.1);
            border: 1px solid rgba(133, 133, 133, 0.2);
        }

        .status-stopped .status-dot {
            background: var(--docker-text-dim);
        }

        .usage-bar-container {
            width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .usage-bar {
            height: 100%;
            background: linear-gradient(90deg, #00cfff, #14f1b2);
        }

        .action-btn {
            width: 32px;
            height: 32px;
            background: rgba(20, 241, 178, 0.1);
            border: 1px solid rgba(20, 241, 178, 0.2);
            color: var(--accent-teal);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: rgba(20, 241, 178, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .action-btn-danger:hover {
            color: var(--docker-red);
            border-color: var(--docker-red);
        }


        .toast {
            background: #0a0f14;
            border: 1px solid var(--docker-border);
            border-radius: 10px;
            color: var(--accent-teal);
            padding: 15px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="dashboard-body">

    <aside class="sidebar">
        <div class="brand">
            <span class="shield">
                <i data-lucide="shield"></i>
            </span>
            <div>
                <h2>Hacker Portal</h2>
                <p>Learn & Conquer</p>
            </div>
        </div>

        <nav class="menu">
            <a href="/admin/dashboard"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="/admin/users"><i data-lucide="users"></i> User Management</a>
            <a href="/admin/challenges"><i data-lucide="target"></i> Challenges</a>
            <a href="/admin/tutorials"><i data-lucide="book-open"></i> Tutorials</a>
            <a href="/admin/quizzes"><i data-lucide="help-circle"></i> Quizzes</a>
            <a href="/admin/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
            <a href="/admin/sandbox" class="active"><i data-lucide="cpu"></i> Sandbox Monitor</a>
            <a href="/admin/notifications"><i data-lucide="bell"></i> Notifications</a>
            <a href="/admin/analytics"><i data-lucide="bar-chart-2"></i> Analytics</a>
        </nav>

        <a class="logout" href="/">
            <i data-lucide="log-out"></i> Logout
        </a>
    </aside>

    <!-- MAIN -->
    <main class="dashboard-main">

        <!-- TOP BAR -->
        <header class="topbar">
            <h2>Sandbox Monitor</h2>
        </header>

        <!-- CONTENT -->
        <section class="sandbox-container">

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-label">Total Sessions</div>
                    <div class="stat-value" id="totalContainers">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Running</div>
                    <div class="stat-value" id="runningContainers">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Stopped History</div>
                    <div class="stat-value" id="stoppedContainers">-</div>
                </div>
            </div>

            <!-- List Area -->
            <div class="containers-section">
                <div class="containers-header">
                    <input type="text" id="searchInput" class="filter-input" placeholder="Filter containers..."
                        onkeyup="filterContainers()">
                    <select id="statusFilter" class="filter-select" onchange="filterContainers()">
                        <option value="">All Status</option>
                        <option value="running">Running</option>
                        <option value="stopped">Stopped</option>
                    </select>
                    <div style="flex: 1;"></div>
                    <button class="action-btn" onclick="refreshContainers()" title="Refresh">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                </div>

                <table class="containers-table" id="containersTable">
                    <thead>
                        <tr>
                            <th style="width: 320px;">Container Instance</th>
                            <th>Status</th>
                            <th>Port</th>
                            <th>User ID</th>
                            <th>Resource Usage</th>
                            <th>Traffic I/O</th>
                            <th>Uptime</th>
                            <th style="width: 100px; text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="containersTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let containersData = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadContainers();
            lucide.createIcons();
            setInterval(loadContainers, 30000);
        });

        async function loadContainers() {
            try {
                const response = await fetch('/admin/api/running-containers');
                const data = await response.json();
                if (data.success) {
                    containersData = data.containers;
                    renderContainers(containersData);
                    updateStats();
                }
            } catch (error) { console.error('Error loading containers:', error); }
        }

        function updateStats() {
            const total = containersData.length;
            const running = containersData.filter(c => c.status === 'running').length;
            const stopped = total - running;
            document.getElementById('totalContainers').textContent = total;
            document.getElementById('runningContainers').textContent = running;
            document.getElementById('stoppedContainers').textContent = stopped;
        }

        function renderContainers(containers) {
            const tbody = document.getElementById('containersTableBody');
            if (containers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; padding: 60px; color: var(--docker-text-dim);"><i data-lucide="box" style="width: 48px; height: 48px; opacity: 0.2; margin-bottom: 10px;"></i><div>No sandbox instances found</div></td></tr>`;
                lucide.createIcons(); return;
            }

            tbody.innerHTML = containers.map(container => {
                const isRunning = container.status === 'running';
                const statusClass = isRunning ? 'status-running' : 'status-stopped';
                const cpu = isRunning ? (container.cpu_percent || '0.0') + '%' : '--';
                const memory = isRunning ? (container.memory_usage || '0.0MB') : '--';
                const net = isRunning ? (container.network_io || '0B / 0B') : '--';
                const disk = isRunning ? (container.block_io || '0B / 0B') : '--';
                const cpuPercent = isRunning ? parseFloat(container.cpu_percent) || 0 : 0;
                const port = container.port_mapping || 'None';
                const userId = container.user_id || 'N/A';
                const uptime = calculateUptime(container);

                return `
                    <tr class="container-row" data-container-id="${container.container_id}" data-status="${container.status}">
                        <td>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div style="width: 36px; height: 36px; border-radius: 8px; background: rgba(20, 241, 178, 0.05); border: 1px solid rgba(20, 241, 178, 0.1); display: flex; align-items: center; justify-content: center; color: var(--accent-teal);">
                                    <i data-lucide="box" style="width: 18px; height: 18px;"></i>
                                </div>
                                <div>
                                    <div class="container-name">${container.container_id.substring(0, 12)}</div>
                                    <div class="container-image">${container.image || 'sandbox-node'}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="status-pill ${statusClass}">
                                <div class="status-dot"></div>
                                ${container.status}
                            </div>
                        </td>
                        <td style="font-family: monospace; color: var(--accent-teal); font-weight: 600;">${port}</td>
                        <td style="color: var(--docker-text-dim); font-size: 12px;">#${userId}</td>
                        <td>
                            <div class="usage-value">CPU: ${cpu}</div>
                            ${isRunning ? `<div class="usage-bar-container"><div class="usage-bar" style="width: ${Math.min(cpuPercent, 100)}%"></div></div>` : ''}
                            <div class="usage-value" style="margin-top: 4px;">Mem: ${memory}</div>
                        </td>
                        <td>
                            <div class="usage-value">Net: ${net}</div>
                            <div class="usage-value" style="margin-top: 4px;">Disk: ${disk}</div>
                        </td>
                        <td class="usage-value">${uptime}</td>
                        <td>
                            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                                <button class="action-btn" onclick="copyToClipboard('${container.container_id}')" title="Copy ID">
                                    <i data-lucide="copy" style="width: 14px; height: 14px;"></i>
                                </button>
                                ${isRunning ? `
                                    <button class="action-btn" onclick="stopContainer('${container.container_id}')" title="Stop Instance">
                                        <i data-lucide="square" style="width: 14px; height: 14px; fill: currentColor;"></i>
                                    </button>
                                ` : `
                                    <button class="action-btn action-btn-danger" onclick="removeContainer('${container.container_id}')" title="Wipe History">
                                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                                    </button>
                                `}
                            </div>
                        </td>
                    </tr>`;
            }).join('');
            lucide.createIcons();
        }

        function calculateUptime(container) {
            if (!container.started_at) return '--';
            const start = new Date(container.started_at);
            const end = container.stopped_at ? new Date(container.stopped_at) : new Date();
            const diff = Math.floor((end - start) / 1000);
            if (diff < 60) return `${diff}s`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ${diff % 60}s`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ${Math.floor((diff % 3600) / 60)}m`;
            return `${Math.floor(diff / 86400)}d ${Math.floor((diff % 86400) / 3600)}h`;
        }

        function filterContainers() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const statusValue = document.getElementById('statusFilter').value;
            document.querySelectorAll('.container-row').forEach(row => {
                const text = row.innerText.toLowerCase();
                const status = row.getAttribute('data-status');
                row.style.display = (text.includes(searchValue) && (!statusValue || status === statusValue)) ? '' : 'none';
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast('✓ ID copied to clipboard', 'success'));
        }

        async function stopContainer(id) {
            const resp = await fetch('/admin/api/stop-container', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ container_id: id }) });
            if ((await resp.json()).success) { showToast('Instance shutdown', 'success'); loadContainers(); }
        }

        async function removeContainer(id) {
            const resp = await fetch('/admin/api/remove-container', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ container_id: id }) });
            if ((await resp.json()).success) { showToast('History wiped', 'success'); loadContainers(); }
        }

        function refreshContainers() { loadContainers(); showToast('Synchronizing...', 'info'); }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>

</html>
