<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Editor</title>

    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/admin_dashboard.css?v=1">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 11, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 234, 255, 0.2);
            border-top-color: #00eaff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast Notifications */
        .toast {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            color: #fff;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            background: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .toast.hide {
            animation: slideOut 0.3s ease-out forwards;
        }

        @keyframes slideOut {
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        /* Editor Layout */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .section {
            background: #0b0f14;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1f2937;
        }

        .section h2 {
            color: #14f1b2;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #d1d5db;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #1f2937;
            background: #121821;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #14f1b2;
            box-shadow: 0 0 10px rgba(20, 241, 178, 0.2);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: #14f1b2;
            color: #000;
        }

        .btn-primary:hover {
            background: #0dd19f;
            box-shadow: 0 6px 16px rgba(20, 241, 178, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
            box-shadow: 0 6px 16px rgba(100, 116, 139, 0.4);
        }

        .question-item {
            background: linear-gradient(180deg, rgba(20, 241, 178, 0.08), rgba(0, 0, 0, 0.4));
            border-left: 4px solid #14f1b2;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-header h3 {
            color: #14f1b2;
            font-size: 14px;
            margin: 0;
        }

        .option-item {
            background: #121821;
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #14f1b2;
        }

        .option-item input[type="text"] {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #1f2937;
            border-radius: 4px;
            background: #0b0f14;
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            flex: 1;
            min-width: 120px;
        }

        .questions-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        /* Page Transition Animations */
        .sidebar {
            animation: slideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        main {
            animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #14f1b2;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .back-btn:hover {
            color: #0dd19f;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-published {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge-draft {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
    </style>
</head>

<body class="dashboard-body">

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
        <div class="brand">
            <span class="shield">
                <i data-lucide="shield"></i>
            </span>
            <div>
                <h2>Hacker Portal</h2>
                <p>Learn & Conquer</p>
            </div>
        </div>

        <nav class="menu">
            <a href="/admin/dashboard"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="/admin/users"><i data-lucide="users"></i> User Management</a>
            <a href="/admin/challenges"><i data-lucide="target"></i> Challenges</a>
            <a href="/admin/tutorials"><i data-lucide="book-open"></i> Tutorials</a>
            <a href="/admin/quizzes" class="active"><i data-lucide="help-circle"></i> Quizzes</a>
            <a href="/admin/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
            <a href="/admin/sandbox"><i data-lucide="cpu"></i> Sandbox Monitor</a>
            <a href="/admin/notifications"><i data-lucide="bell"></i> Notifications</a>
            <a href="/admin/analytics"><i data-lucide="bar-chart-2"></i> Analytics</a>
        </nav>

        <a class="logout" href="/">
            <i data-lucide="log-out"></i> Logout
        </a>
    </aside>

    <!-- ================= MAIN ================= -->
    <main class="dashboard-main">

        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h2 id="pageTitle">Loading...</h2>
                <span class="status-badge badge-draft" id="statusBadge">Draft</span>
            </div>
        </header>

        <section class="editor-layout" id="editorContainer" style="display: none;">

            <!-- Quiz Settings -->
            <div class="section">
                <h2>Quiz Settings</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="titleInput" placeholder="Quiz title">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="categoryInput">
                            <option value="SQL Injection">SQL Injection</option>
                            <option value="Web Security">Web Security</option>
                            <option value="Cryptography">Cryptography</option>
                            <option value="Network Security">Network Security</option>
                            <option value="General">General</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Difficulty</label>
                        <select id="difficultyInput">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Points</label>
                        <input type="number" id="pointsInput" value="10" min="1">
                    </div>
                    <div class="form-group">
                        <label>Passing Score (%)</label>
                        <input type="number" id="passingScoreInput" value="70" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label>Time Limit (minutes)</label>
                        <input type="number" id="timeLimitInput" placeholder="Leave empty for no limit" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="descriptionInput" placeholder="Quiz description"></textarea>
                </div>
                <button class="btn btn-primary" onclick="updateQuizSettings()">Save Settings</button>
            </div>

            <!-- Questions Section -->
            <div class="section">
                <h2>Questions</h2>
                <div id="questionsContainer"></div>
                <button class="btn btn-success" style="width: 100%;" onclick="addQuestion()">+ Add Question</button>
            </div>

            <!-- Action Bar -->
            <div class="section" style="display: flex; gap: 10px; padding: 20px; align-items: center;">
                <button class="btn btn-secondary" onclick="goBack()">← Back</button>
                <button class="btn btn-success" onclick="saveAndExit()" style="flex: 1;">✓ Save & Finish</button>
                <button class="btn btn-primary" onclick="saveQuizAll()">Save Changes</button>
                <button id="publishBtn" class="btn btn-primary" style="background: #22c55e; color: white;"
                    onclick="togglePublish()">Publish</button>
                <span id="saveStatus" style="font-size: 12px; color: #9ca3af;"></span>
            </div>

        </section>

    </main>

    <script>
        console.log("Quiz Editor Version: 2.2 (Robust Save)");
        let quizId = null;
        let quizData = { questions: [] };

        function generateId() {
            return 'new_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        window.addEventListener('load', loadQuiz);

        async function loadQuiz() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const urlPath = window.location.pathname;
                const pathParts = urlPath.split('/');
                quizId = parseInt(pathParts[3]);

                if (!quizId || isNaN(quizId)) {
                    throw new Error(`Invalid quiz ID: ${quizId}`);
                }

                const response = await fetch(`/admin/api/quizzes/${quizId}`);
                if (!response.ok) throw new Error(`Failed to load quiz: ${response.statusText}`);

                quizData = await response.json();
                if (!quizData.questions) quizData.questions = [];

                // Populate settings
                document.getElementById('titleInput').value = quizData.title || '';
                document.getElementById('descriptionInput').value = quizData.description || '';
                document.getElementById('categoryInput').value = quizData.category || 'General';
                document.getElementById('difficultyInput').value = quizData.difficulty || 'beginner';
                document.getElementById('pointsInput').value = quizData.points || 10;
                document.getElementById('passingScoreInput').value = quizData.passing_score || 70;
                document.getElementById('timeLimitInput').value = quizData.time_limit || '';

                document.getElementById('pageTitle').textContent = quizData.title;
                const badge = document.getElementById('statusBadge');
                badge.textContent = quizData.is_published ? '✓ Published' : 'Draft';
                badge.className = `status-badge ${quizData.is_published ? 'badge-published' : 'badge-draft'}`;

                renderQuestions();
                updatePublishButton();
                loading.classList.remove('active');
                document.getElementById('editorContainer').style.display = 'grid';
            } catch (error) {
                console.error('Error loading quiz:', error);
                showToast('Error: ' + error.message, 'error');
                loading.classList.remove('active');
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            if (!quizData.questions || quizData.questions.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #9ca3af; padding: 40px;">No questions yet. Click "+ Add Question" to start!</p>';
                return;
            }

            quizData.questions.forEach((question, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-item';

                qDiv.innerHTML = `
                    <div class="question-header">
                        <h3>Question ${qIndex + 1}</h3>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteQuestion(${qIndex})">Delete</button>
                    </div>
                    
                    <textarea placeholder="Enter question text" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #1f2937; background: #121821; color: #fff; margin-bottom: 12px; font-family: inherit;" oninput="updateQuestionData(${qIndex}, 'text', this.value)">${escapeHtml(question.text || '')}</textarea>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Type</label>
                            <select style="padding: 8px; border-radius: 6px; border: 1px solid #1f2937; background: #121821; color: #fff;" onchange="updateQuestionData(${qIndex}, 'type', this.value)">
                                <option value="multiple_choice" ${question.type === 'multiple_choice' ? 'selected' : ''}>Multiple Choice</option>
                                <option value="true_false" ${question.type === 'true_false' ? 'selected' : ''}>True/False</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Points</label>
                            <input type="number" value="${question.points || 1}" min="1" style="padding: 8px; border-radius: 6px; border: 1px solid #1f2937; background: #121821; color: #fff;" oninput="updateQuestionData(${qIndex}, 'points', parseInt(this.value))">
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px;">
                        <label style="color: #d1d5db; font-weight: 600; margin-bottom: 10px; display: block; font-size: 13px;">Options (Check the correct answer)</label>
                        <div id="options-${qIndex}"></div>
                        <button class="btn btn-secondary" style="width: 100%; padding: 8px; font-size: 12px; margin-top: 10px; background: rgba(20,241,178,0.1); color: #14f1b2;" onclick="addOption(${qIndex})">+ Add Option</button>
                    </div>
                `;
                container.appendChild(qDiv);

                const optContainer = document.getElementById(`options-${qIndex}`);
                if (!question.options) question.options = [];

                question.options.forEach((option, oIndex) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option-item';
                    optDiv.innerHTML = `
                        <input type="checkbox" ${option.is_correct ? 'checked' : ''} onchange="updateOptionData(${qIndex}, ${oIndex}, 'is_correct', this.checked)">
                        <input type="text" value="${escapeHtml(option.text || '')}" placeholder="Option text" oninput="updateOptionData(${qIndex}, ${oIndex}, 'text', this.value)">
                        <button class="btn btn-danger" style="padding: 6px 10px; font-size: 12px; background: none; box-shadow: none;" onclick="deleteOption(${qIndex}, ${oIndex})"><i data-lucide="trash-2" style="width: 14px; height: 14px;"></i></button>
                    `;
                    optContainer.appendChild(optDiv);
                });
            });
            lucide.createIcons();
        }

        function updateQuestionData(qIndex, field, value) {
            quizData.questions[qIndex][field] = value;
        }

        function updateOptionData(qIndex, oIndex, field, value) {
            if (field === 'is_correct') {
                if (value === true) {
                    // Ensure only one is correct for multiple choice
                    quizData.questions[qIndex].options.forEach((opt, idx) => {
                        opt.is_correct = (idx === oIndex);
                    });
                    renderQuestions(); // Re-render to update checkboxes
                } else {
                    quizData.questions[qIndex].options[oIndex].is_correct = false;
                }
            } else {
                quizData.questions[qIndex].options[oIndex][field] = value;
            }
        }

        function addQuestion() {
            quizData.questions.push({
                id: generateId(),
                text: '',
                type: 'multiple_choice',
                points: 1,
                options: [
                    { id: generateId(), text: 'Option 1', is_correct: true },
                    { id: generateId(), text: 'Option 2', is_correct: false }
                ]
            });
            renderQuestions();
        }

        function deleteQuestion(qIndex) {
            quizData.questions.splice(qIndex, 1);
            renderQuestions();
        }

        function addOption(qIndex) {
            quizData.questions[qIndex].options.push({
                id: generateId(),
                text: '',
                is_correct: false
            });
            renderQuestions();
        }

        function deleteOption(qIndex, oIndex) {
            quizData.questions[qIndex].options.splice(oIndex, 1);
            renderQuestions();
        }

        async function saveQuizAll(silent = false) {
            const statusEl = document.getElementById('saveStatus');
            if (!silent) {
                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');
            }
            if (statusEl) statusEl.textContent = 'Saving...';

            try {
                // 1. Update Basic Settings
                const metadata = {
                    title: document.getElementById('titleInput').value,
                    description: document.getElementById('descriptionInput').value,
                    category: document.getElementById('categoryInput').value,
                    difficulty: document.getElementById('difficultyInput').value,
                    points: parseInt(document.getElementById('pointsInput').value) || 0,
                    passing_score: parseInt(document.getElementById('passingScoreInput').value) || 0,
                    time_limit: document.getElementById('timeLimitInput').value ? parseInt(document.getElementById('timeLimitInput').value) : null
                };

                const updateResp = await fetch(`/admin/quizzes/${quizId}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(metadata)
                });

                if (!updateResp.ok) {
                    const errData = await updateResp.json().catch(() => ({}));
                    throw new Error(`Settings update failed: ${errData.detail || updateResp.statusText}`);
                }

                // 2. Save Questions and Options
                console.log("Sending questions payload:", { questions: quizData.questions });
                const response = await fetch(`/admin/api/quizzes/${quizId}/save_all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questions: quizData.questions })
                });

                if (response.ok) {
                    const result = await response.json();
                    if (!silent) showToast('Changes saved successfully', 'success');
                    if (statusEl) statusEl.textContent = `Last saved: ${new Date().toLocaleTimeString()} (${result.question_count} questions)`;

                    // Refresh from DB to get real IDs and synchronize
                    const refresh = await fetch(`/admin/api/quizzes/${quizId}`);
                    if (refresh.ok) {
                        quizData = await refresh.json();
                        renderQuestions();
                    }
                } else {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(`Atomic save failed: ${err.detail || response.statusText}`);
                }
            } catch (error) {
                console.error('Save Error:', error);
                const msg = error.message || 'Unknown save error';
                if (!silent) showToast(msg, 'error');
                if (statusEl) statusEl.textContent = 'Error: ' + msg;
            } finally {
                if (!silent) document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        async function saveAndExit() {
            await saveQuizAll();
            window.location.href = '/admin/quizzes';
        }

        function goBack() {
            if (confirm('Any unsaved changes will be lost. Return to list?')) {
                window.location.href = '/admin/quizzes';
            }
        }

        async function togglePublish() {
            const isPublished = quizData.is_published;
            const endpoint = isPublished ? 'unpublish' : 'publish';

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const response = await fetch(`/admin/quizzes/${quizId}/${endpoint}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    showToast(`Quiz ${endpoint}ed successfully`, 'success');
                    // Reload to update UI
                    await loadQuiz();
                } else {
                    showToast('Error updating quiz status', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error updating quiz status', 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        function updatePublishButton() {
            const btn = document.getElementById('publishBtn');
            if (!btn) return;

            if (quizData.is_published) {
                btn.textContent = 'Unpublish';
                btn.style.background = '#f59e0b'; // Amber for unpublish
            } else {
                btn.textContent = 'Publish';
                btn.style.background = '#22c55e'; // Green for publish
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        lucide.createIcons();
    </script>
</body>

</html>
