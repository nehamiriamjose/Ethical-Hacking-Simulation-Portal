<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0b0f14, #020409);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0f7fa;
}

/* Card – SAME AS ADMIN LOGIN */
.card {
    width: 420px;
    background: rgba(15, 20, 26, 0.95);
    border-radius: 18px;
    padding: 40px 35px;

    box-shadow:
        0 0 5px #00cfff,
        0 0 15px #00cfff,
        0 0 35px rgba(0, 207, 255, 0.9),
        0 0 70px rgba(0, 207, 255, 0.7);

    animation: neonPulse 2s infinite alternate ease-in-out;
}

@keyframes neonPulse {
    from {
        box-shadow:
            0 0 6px #00cfff,
            0 0 20px rgba(0, 207, 255, 0.8),
            0 0 40px rgba(0, 207, 255, 0.6);
    }
    to {
        box-shadow:
            0 0 12px #00cfff,
            0 0 35px rgba(0, 207, 255, 1),
            0 0 80px rgba(0, 207, 255, 0.9);
    }
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 28px;
}

.icon {
    font-size: 40px;
    color: #00cfff;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    margin: 0 auto 10px;
}

.icon i,
.icon svg {
    width: 40px !important;
    height: 40px !important;
    stroke: #00cfff !important;
    color: #00cfff !important;
}

.header h1 {
    margin: 10px 0 4px;
    font-size: 22px;
    color: #00cfff;
}

.header p {
    margin: 0;
    font-size: 13px;
    color: #7fdfff;
}

/* Inputs */
.group {
    margin-top: 18px;
}

.group label {
    font-size: 12px;
    color: #9fbfcf;
}

.group input {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    background: #0b0f14;
    border: 1px solid #1e2a33;
    border-radius: 10px;
    color: #e0f7fa;
    outline: none;
}

.group input:focus {
    border-color: #00cfff;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.4);
}

/* Button */
button {
    margin-top: 26px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00cfff, #00ffb4);
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    color: #00141a;
}

button:hover {
    filter: brightness(1.1);
}

/* Footer */
.footer {
    margin-top: 22px;
    text-align: center;
    font-size: 13px;
}

.footer a {
    color: #8faebd;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="card">

    <div class="header">
        <div class="icon">
            <i data-lucide="shield"></i>
        </div>
        <h1>Hacker Portal</h1>
        <p>Learn & Conquer</p>
    </div>

    <form method="post" action="/admin/forgot_password">

        <div class="group">
            <label>Admin Email</label>
            <input type="email" name="email" placeholder="admin@portal.com" required>
        </div>

        <button type="submit">Verify Email</button>

    </form>

    <div class="footer">
        <a href="/admin/login">← Back to Login</a>
    </div>

</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
